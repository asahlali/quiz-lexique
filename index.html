const SYNC_URL_KEY = 'lexiqueQuiz::syncUrl';
const DEFAULT_SYNC_URL = 'https://script.google.com/macros/s/AKfycbyaZcLtLEhch3xaS330VjtdcpIpdDShZzevuhdVyEpDbbBelg7PWlcnFfpszqPQnK2VLw/exec';
const LAST_SYNC_KEY = 'lexiqueQuiz::lastSync';
const SYNC_EXCLUDED = [SYNC_URL_KEY, LAST_SYNC_KEY];
let syncBusy = false;

function getSyncUrl(){
  try{ return localStorage.getItem(SYNC_URL_KEY) || DEFAULT_SYNC_URL; }catch(e){ return DEFAULT_SYNC_URL; }
}
function setSyncUrl(u){
  try{
    if(u){ localStorage.setItem(SYNC_URL_KEY, u); } else { localStorage.removeItem(SYNC_URL_KEY); }
  }catch(e){}
}
function safeParse(s, fallback){
  try{ return JSON.parse(s); }catch(e){ return fallback; }
}

function collectLocalData(){
  const data = {};
  try{
    for(let i = 0; i < localStorage.length; i++){
      const key = localStorage.key(i);
      if(!key || !key.startsWith('lexiqueQuiz::')) continue;
      if(SYNC_EXCLUDED.includes(key)) continue;
      data[key] = localStorage.getItem(key);
    }
  }catch(e){}
  return data;
}

async function cloudRequest(bodyObj){
  const url = getSyncUrl();
  if(!url) throw new Error('URL de synchro non configurée');
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(bodyObj)
  });
  const out = await res.json();
  if(!out.ok) throw new Error(out.error || 'Réponse invalide du script');
  return out;
}

async function cloudPush(){
  const data = collectLocalData();
  const out = await cloudRequest({ action: 'push', data });
  try{ localStorage.setItem(LAST_SYNC_KEY, String(Date.now())); }catch(e){}
  return out.saved || 0;
}

async function cloudPull(){
  const out = await cloudRequest({ action: 'pull' });
  const changed = mergeRemoteData(out.data || {});
  try{ localStorage.setItem(LAST_SYNC_KEY, String(Date.now())); }catch(e){}
  return changed;
}

function cloudDeleteKeys(keys){
  if(!getSyncUrl()) return;
  cloudRequest({ action: 'delete', keys }).catch(() => {});
}

/* Fusionne les données distantes dans le stockage local, sans rien perdre. */
function mergeRemoteData(remote){
  let changed = false;
  for(const key of Object.keys(remote)){
    const rv = remote[key].v;
    if(rv == null) continue;

    if(key === DAILY_LOG_KEY){
      const remoteLog = safeParse(rv, {});
      let m = false;
      for(const day of Object.keys(remoteLog)){
        const rc = remoteLog[day] || 0;
        if((dailyLog[day] || 0) < rc){ dailyLog[day] = rc; m = true; }
      }
      if(m){ saveDailyLog(); changed = true; }

    } else if(key === DAILY_STATS_KEY){
      const remoteStats = safeParse(rv, {});
      let m = false;
      for(const day of Object.keys(remoteStats)){
        const r = remoteStats[day] || {};
        const l = dailyStats[day] || { seconds:0, passed:0, xp:0 };
        const merged = {
          seconds: Math.max(l.seconds||0, r.seconds||0),
          passed: Math.max(l.passed||0, r.passed||0),
          xp: Math.max(l.xp||0, r.xp||0),
        };
        if(JSON.stringify(merged) !== JSON.stringify(l)){ dailyStats[day] = merged; m = true; }
      }
      if(m){ saveDailyStats(); changed = true; }

    } else if(key === XP_TOTAL_KEY){
      const rx = parseInt(rv,10) || 0;
      if(rx > xpTotal){ xpTotal = rx; saveXpTotal(); changed = true; }

    } else if(key === WORD_STATS_KEY){
      const remoteStats = safeParse(rv, {});
      let m = false;
      for(const w of Object.keys(remoteStats)){
        const rs = remoteStats[w];
        const ls = wordStats[w];
        if(!ls || ((rs.correct||0) + (rs.wrong||0)) > ((ls.correct||0) + (ls.wrong||0))){
          wordStats[w] = rs; m = true;
        }
      }
      if(m){ saveWordStats(); changed = true; }

    } else if(key === CUSTOM_WORDS_KEY){
      const remoteWords = safeParse(rv, null);
      if(Array.isArray(remoteWords) && remoteWords.length){
        const base = loadCustomWords() || WORDS.slice();
        const seen = new Set(base.map(w => w.fr.toLowerCase()));
        let added = 0;
        remoteWords.forEach(w => {
          if(!w || !w.fr) return;
          const k = w.fr.toLowerCase();
          if(!seen.has(k)){ seen.add(k); base.push(w); added++; }
        });
        if(added > 0 || !loadCustomWords()){
          saveCustomWords(base);
          WORDS = base;
          changed = true;
        }
      }

    } else if(rv.includes('finishedAt')){
      // résultat de bloc : on garde le plus récent
      const remoteRes = safeParse(rv, null);
      const localRaw = (()=>{ try{ return localStorage.getItem(key); }catch(e){ return null; } })();
      const localRes = localRaw ? safeParse(localRaw, null) : null;
      if(remoteRes && (!localRes || (remoteRes.finishedAt||0) > (localRes.finishedAt||0))){
        try{ localStorage.setItem(key, rv); }catch(e){}
        changed = true;
      }

    } else {
      // petites préférences (durée du chrono, affichage...) : le cloud gagne
      try{
        if(localStorage.getItem(key) !== rv){ localStorage.setItem(key, rv); changed = true; }
      }catch(e){}
    }
  }

  if(changed){
    quizTimerSeconds = loadTimerSetting();
    autoSpeak = loadAutoSpeak();
    dailyLog = loadDailyLog();
    dailyStats = loadDailyStats();
    xpTotal = loadXpTotal();
    if(typeof updateAutoSpeakBtn === 'function'){ updateAutoSpeakBtn(); }
    try{ const dv = localStorage.getItem('lexiqueQuiz::dictView'); if(dv==='list'||dv==='cards') dictView = dv; }catch(e){}
    rebuildBlocks();
  }
  return changed;
}

function cloudAutoPush(){
  if(!getSyncUrl() || syncBusy) return;
  syncBusy = true;
  cloudPush()
    .then(() => { setStatus('☁️ Scores synchronisés.', 'ok'); })
    .catch(() => { setStatus('☁️ Synchro impossible (hors ligne ?) — scores gardés en local.', 'err'); })
    .finally(() => { syncBusy = false; });
}

function showSyncOverlay(msg){
  const ov = document.getElementById('syncOverlay');
  if(!ov) return;
  const m = document.getElementById('syncOverlayMsg');
  if(m && msg) m.textContent = msg;
  ov.classList.remove('hide');
  ov.classList.add('show');
}
function hideSyncOverlay(){
  const ov = document.getElementById('syncOverlay');
  if(!ov) return;
  ov.classList.add('hide');
  setTimeout(() => { ov.classList.remove('show','hide'); }, 420);
}

async function autoSyncOnLoad(){
  if(!getSyncUrl()){ hideSyncOverlay(); return; }
  showSyncOverlay('Chargement de tes données…');
  try{
    setStatus('☁️ Synchronisation...', 'ok');
    const changed = await cloudPull();
    await cloudPush();
    setStatus(changed ? '☁️ Synchronisé — nouvelles données récupérées !' : '☁️ Synchronisé.', 'ok');
    if(changed && currentBlock === null){ renderBlockSelect(); }
  }catch(e){
    setStatus('☁️ Synchro impossible — mode local.', 'err');
  }finally{
    hideSyncOverlay();
  }
}

  };
}

function exportFullBackup(){
  const data = collectLocalData();
  const backup = { app:'VocabVISION', version:1, exportedAt:new Date().toISOString(), data };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date();
  a.download = `vocabvision-sauvegarde-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importFullBackup(text){
  let obj;
  try{ obj = JSON.parse(text); }catch(e){ return { ok:false, error:'Fichier illisible.' }; }
  const data = obj && obj.data ? obj.data : obj;
  if(!data || typeof data !== 'object') return { ok:false, error:'Format de sauvegarde non reconnu.' };
  // fusionne dans localStorage puis via la logique de fusion cloud pour ne rien écraser bêtement
  const remoteLike = {};
  let count = 0;
  for(const k of Object.keys(data)){
    if(!k.startsWith('lexiqueQuiz::')) continue;
    if(k === SYNC_URL_KEY) continue;
    remoteLike[k] = { v: data[k], t: 0 };
    count++;
  }
  mergeRemoteData(remoteLike);
  return { ok:true, count };
}

function formatLastSync(){
  try{
    const t = parseInt(localStorage.getItem(LAST_SYNC_KEY), 10);
    if(!t) return 'jamais';
    return new Date(t).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  }catch(e){ return 'jamais'; }
}

      <div class="pm-row"><span>🏆 Tests de bloc enregistrés</span><span class="pm-score">${summary.blockResults}</span></div>

    if(!file) return;

    reader.onload = () => {

    try{
      const n = await cloudPush();
      setSyncMsg(`✓ ${n} élément${n>1?'s':''} envoyé${n>1?'s':''} vers ta feuille Google !`, true);
    }catch(e){ setSyncMsg('✗ Échec de l\'envoi : ' + escapeHtml(e.message), false); }
  });

  document.getElementById('pullSyncBtn').addEventListener('click', async () => {
    setSyncMsg('⏳ Récupération en cours...', true);
    try{
      const changed = await cloudPull();
      setSyncMsg(changed ? '✓ Données récupérées et fusionnées !' : '✓ Déjà à jour, rien de nouveau.', true);
    }catch(e){ setSyncMsg('✗ Échec de la récupération : ' + escapeHtml(e.message), false); }
  });
}

/* ============ 📲 PWA : installation depuis le navigateur ============ */
(function setupPWA(){
  // Enregistrement du service worker (nécessaire pour l'installation + hors-ligne)
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  let deferredPrompt = null;
  const installBtn = document.getElementById('installBtn');

  // Détecte si déjà installé (mode standalone)
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if(installBtn && !isStandalone){ installBtn.style.display = 'flex'; }
  });

  if(installBtn){
    installBtn.addEventListener('click', async () => {
      if(deferredPrompt){
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        installBtn.style.display = 'none';
        if(outcome === 'accepted'){ setStatus('✅ VocabVISION installé !', 'ok'); }
      } else {
        // iOS / navigateurs sans beforeinstallprompt : instructions manuelles
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        if(isIOS){
          alert("Pour installer VocabVISION sur iPhone/iPad :\n\n1. Appuie sur le bouton Partager (carré avec une flèche) en bas de Safari\n2. Choisis « Sur l'écran d'accueil »\n3. Appuie sur « Ajouter »");
        } else {
          alert("Pour installer VocabVISION :\n\nOuvre le menu de ton navigateur (⋮) et choisis « Installer l'application » ou « Ajouter à l'écran d'accueil ».");
        }
      }
    });
  }

  window.addEventListener('appinstalled', () => {
    if(installBtn){ installBtn.style.display = 'none'; }
    deferredPrompt = null;
  });

  // Sur iOS (pas de beforeinstallprompt), on montre quand même le bouton avec instructions
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS && !isStandalone && installBtn){ installBtn.style.display = 'flex'; }
})();
