<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VocabVISION — Vocabulaire Français ↔ Arabe</title>

<!-- PWA : installation depuis le navigateur -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#4F46E5">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VocabVISION">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&family=Changa:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --purple:#4F46E5;        /* indigo primaire */
    --purple-dark:#3730A3;
    --pink:#0EA5A4;          /* teal accent (remplace le rose) */
    --orange:#F59E0B;        /* ambre */
    --yellow:#FBBF24;
    --green:#10B981;
    --green-dark:#059669;
    --red:#EF4444;
    --red-dark:#DC2626;
    --blue:#38BDF8;
    --ink:#0F172A;           /* slate 900 */
    --card:#FFFFFF;
    --text:#1E293B;          /* slate 800 */
    --text-dim:#64748B;      /* slate 500 */
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;color:#fff;font-family:'Nunito',sans-serif;
    padding:32px 16px 90px;
    background:
      radial-gradient(760px 520px at 6% 4%, rgba(56,189,248,0.16), transparent 60%),
      radial-gradient(820px 600px at 98% 12%, rgba(16,185,129,0.14), transparent 55%),
      radial-gradient(700px 560px at 50% 108%, rgba(79,70,229,0.30), transparent 60%),
      linear-gradient(165deg, #1E1B4B 0%, #312E81 48%, #3730A3 100%);
    background-attachment:fixed;
    overflow-x:hidden;
  }
  .wrap{max-width:820px;margin:0 auto;position:relative;}

  header{text-align:center;margin-bottom:22px;}
  .eyebrow{
    display:inline-block;font-family:'Baloo 2',sans-serif;font-weight:700;letter-spacing:.04em;font-size:13px;
    color:var(--purple-dark);background:var(--yellow);padding:6px 16px;border-radius:999px;
    box-shadow:0 3px 0 #B45309;margin-bottom:14px;transform:rotate(-2deg);
  }
  h1{
    font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(30px,6vw,48px);margin:0 0 8px;
    color:#fff;text-shadow:0 4px 0 rgba(0,0,0,0.15), 0 0 30px rgba(255,255,255,0.25);
    letter-spacing:.01em;
  }
  .sub{color:rgba(255,255,255,0.85);font-size:15px;max-width:520px;margin:0 auto;font-weight:600;}

  .csv-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:22px 0 6px;}
  .csv-btn{
    background:rgba(255,255,255,0.16);border:2px solid rgba(255,255,255,0.35);color:#fff;
    padding:9px 16px;border-radius:999px;font-size:12.5px;font-weight:800;cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:all .15s ease;font-family:'Nunito',sans-serif;
  }
  .csv-btn:hover{background:rgba(255,255,255,0.3);transform:translateY(-2px);}
  .csv-status{text-align:center;font-size:13px;color:#fff;margin-top:10px;min-height:16px;font-weight:700;}
  .csv-status.ok{color:#C6FFDD;}
  .csv-status.err{color:#FFD0D3;}

  .scoreboard{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:20px 0 8px;}
  .chip{
    background:#fff;border:none;border-radius:999px;padding:9px 18px;font-size:13.5px;
    display:flex;align-items:center;gap:8px;font-weight:800;color:var(--text);
    box-shadow:0 3px 0 rgba(0,0,0,0.15);
  }
  .chip b{color:var(--purple);font-family:'Baloo 2',sans-serif;font-weight:800;}
  .chip.total{background:var(--yellow);color:#5A3E00;box-shadow:0 3px 0 #B45309;}

  .progress-track{
    height:16px;border-radius:999px;background:rgba(255,255,255,0.25);margin:20px 0 34px;overflow:hidden;
    box-shadow:inset 0 2px 5px rgba(0,0,0,0.2);border:2px solid rgba(255,255,255,0.4);
  }
  .progress-fill{
    height:100%;border-radius:999px;width:0%;transition:width .5s cubic-bezier(.34,1.56,.64,1);
    background:repeating-linear-gradient(45deg, var(--green), var(--green) 10px, var(--green-dark) 10px, var(--green-dark) 20px);
    box-shadow:0 0 14px rgba(34,197,94,0.7);
  }

  .card{
    background:var(--card);color:var(--text);border-radius:22px;padding:38px 32px;position:relative;
    box-shadow:0 20px 50px -20px rgba(15,23,42,0.55), 0 6px 18px -12px rgba(15,23,42,0.4);
    border:1px solid rgba(255,255,255,0.6);
  }
  .cat-tag{
    display:inline-block;font-family:'Baloo 2',sans-serif;font-size:12.5px;font-weight:700;
    color:#fff;background:linear-gradient(135deg,var(--pink),var(--orange));padding:6px 16px;border-radius:999px;margin-bottom:20px;
    box-shadow:0 3px 0 rgba(0,0,0,0.15);
  }
  .word-fr{
    font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(28px,6.5vw,46px);line-height:1.05;margin:4px 0 10px;
    color:var(--ink);display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .speak-btn{
    flex:none;width:44px;height:44px;border-radius:50%;border:none;background:var(--blue);
    display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s ease;
    box-shadow:0 4px 0 #0E7490;
  }
  .speak-btn:hover{transform:translateY(-2px);}
  .speak-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #0E7490;}
  .speak-btn svg{width:20px;height:20px;stroke:#fff;}
  .speak-btn.small{width:32px;height:32px;box-shadow:0 3px 0 #0E7490;}
  .speak-btn.small svg{width:14px;height:14px;}
  .ex-row{display:flex;align-items:center;gap:10px;}
  .question-line{color:var(--text-dim);font-size:15px;margin:6px 0 26px;font-weight:700;}

  .options{display:grid;gap:13px;}
  .opt{
    text-align:left;border:none;background:#F1F5F9;border-radius:16px;padding:16px 20px;
    font-size:15px;font-weight:700;line-height:1.4;cursor:pointer;transition:all .12s ease;color:var(--text);
    font-family:'Nunito',sans-serif;box-shadow:0 4px 0 #E2E8F0;
  }
  .opt:hover:not(.disabled){background:#E0E7FF;transform:translateY(-2px);box-shadow:0 6px 0 #E2E8F0;}
  .opt:active:not(.disabled){transform:translateY(2px);box-shadow:0 2px 0 #E2E8F0;}
  .opt.correct{
    background:var(--green);color:#fff;font-weight:800;box-shadow:0 4px 0 var(--green-dark);
    animation:pop .35s ease;
  }
  .opt.wrong{
    background:var(--red);color:#fff;font-weight:800;box-shadow:0 4px 0 var(--red-dark);
  }
  .opt.disabled{cursor:default;}
  .opt.faded{opacity:.35;box-shadow:none;}
  @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.05);}100%{transform:scale(1);}}
  @keyframes shakeCard{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-10px) rotate(-1deg);}
    40%{transform:translateX(9px) rotate(1deg);}
    60%{transform:translateX(-6px);}
    80%{transform:translateX(4px);}
  }
  .card.shake{animation:shakeCard .45s ease;}

  .reveal{margin-top:26px;padding-top:24px;border-top:3px dashed #E4DEFC;display:none;}
  .reveal.show{display:block;animation:fadeUp .4s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .seal{display:flex;align-items:center;gap:18px;margin-bottom:16px;}
  .seal-badge{
    width:66px;height:66px;border-radius:50%;flex:none;
    background:linear-gradient(135deg,var(--yellow),var(--orange));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 5px 0 #B45309;animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes bounceIn{0%{transform:scale(0.3);}60%{transform:scale(1.15);}100%{transform:scale(1);}}
  .seal-badge svg{width:28px;height:28px;stroke:#5A3E00;}
  .arabic-word{font-family:'Changa',sans-serif;font-size:30px;direction:rtl;color:var(--purple);font-weight:700;}
  .def-text{font-size:16px;color:var(--text);margin:6px 0 12px;font-weight:700;}
  .ex-text{font-size:15px;color:var(--text-dim);font-weight:600;}
  .ex-text .tilde{color:var(--pink);font-weight:800;}

  .feedback-msg{font-size:14px;font-weight:900;margin-bottom:4px;font-family:'Baloo 2',sans-serif;letter-spacing:.02em;}
  .feedback-msg.ok{color:var(--green-dark);}
  .feedback-msg.ko{color:var(--red-dark);}

  .next-btn{
    margin-top:24px;width:100%;padding:16px;border:none;border-radius:16px;
    background:linear-gradient(135deg,var(--pink),var(--purple));
    color:#fff;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:16px;cursor:pointer;
    box-shadow:0 5px 0 #3730A3;transition:all .12s ease;
  }
  .next-btn:hover{transform:translateY(-2px);}
  .next-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #3730A3;}

  .footer-note{text-align:center;color:rgba(255,255,255,0.85);font-size:13px;margin-top:26px;font-weight:700;}

  .end-screen{text-align:center;padding:40px 20px;}
  .end-screen .big{
    font-family:'Baloo 2',sans-serif;font-weight:800;font-size:52px;margin:0 0 8px;color:var(--purple);
    animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  .restart-btn{
    margin-top:20px;padding:13px 28px;border:none;border-radius:999px;
    background:var(--yellow);color:#5A3E00;font-weight:800;cursor:pointer;font-size:14.5px;
    font-family:'Baloo 2',sans-serif;box-shadow:0 4px 0 #B45309;transition:all .12s ease;
  }
  .restart-btn:hover{transform:translateY(-2px);}
  .restart-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #B45309;}

  .filter-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:18px 0 24px;}
  .filter-chip{
    border:none;background:#F1F5F9;color:var(--purple-dark);padding:7px 16px;border-radius:999px;
    font-size:12.5px;font-weight:800;cursor:pointer;transition:all .15s ease;font-family:'Nunito',sans-serif;
    box-shadow:0 3px 0 #E2E8F0;
  }
  .filter-chip.active{background:var(--purple);color:#fff;box-shadow:0 3px 0 var(--purple-dark);}

  .recap-wrap{margin-top:26px;text-align:left;}
  .recap-table{width:100%;border-collapse:separate;border-spacing:0 6px;font-size:13.5px;font-family:'Nunito',sans-serif;}
  .recap-table th{
    text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);
    padding:4px 11px;font-weight:800;
  }
  .recap-table td{padding:10px 11px;background:#F8FAFC;vertical-align:middle;color:var(--text);font-weight:700;}
  .recap-table tr td:first-child{border-radius:12px 0 0 12px;}
  .recap-table tr td:last-child{border-radius:0 12px 12px 0;}
  .recap-table .rc-ar{font-family:'Changa',sans-serif;font-size:17px;direction:rtl;color:var(--purple);}
  .recap-table .rc-status{white-space:nowrap;font-weight:800;font-family:'Baloo 2',sans-serif;font-size:12.5px;}
  .recap-table .rc-status.first{color:var(--green-dark);}
  .recap-table .rc-status.retry{color:#C97A00;}
  .recap-table .rc-speak{
    width:26px;height:26px;border-radius:50%;border:none;background:var(--blue);
    display:inline-flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 0 #0E7490;
  }
  .recap-table .rc-speak svg{width:11px;height:11px;stroke:#fff;}
  .recap-scroll{max-height:420px;overflow-y:auto;padding-right:4px;}

  .search-box-wrap{position:relative;margin-bottom:22px;}
  .search-input{
    width:100%;padding:15px 48px 15px 20px;border-radius:16px;border:none;
    background:#F1F5F9;color:var(--text);font-size:15.5px;font-weight:700;font-family:'Nunito',sans-serif;
  }
  .search-input:focus{outline:3px solid var(--purple);}
  .search-input::placeholder{color:var(--text-dim);font-weight:600;}
  .search-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}
  .search-count{font-size:13px;color:var(--text-dim);margin:-12px 0 18px;font-weight:700;}
  .search-results{display:flex;flex-direction:column;gap:12px;max-height:520px;overflow-y:auto;padding-right:4px;}
  .result-card{border:none;background:#F8FAFC;border-radius:18px;padding:18px 20px;}
  .result-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px;}
  .result-fr{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:20px;color:var(--ink);display:flex;align-items:center;gap:10px;}
  .result-cat{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;font-weight:800;color:#fff;background:var(--purple);padding:4px 12px;border-radius:999px;}
  .result-ar{font-family:'Changa',sans-serif;font-size:19px;direction:rtl;color:var(--purple);font-weight:700;margin:4px 0;}
  .result-def{font-size:14.5px;color:var(--text);font-weight:700;margin:4px 0;}
  .result-ex{font-size:14px;color:var(--text-dim);font-weight:600;}
  .no-results{text-align:center;color:var(--text-dim);font-weight:700;padding:30px 10px;}

  .mode-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:4px 0 22px;}
  .mode-chip{
    border:none;background:#F1F5F9;color:var(--purple-dark);padding:10px 18px;border-radius:999px;
    font-weight:800;font-family:'Baloo 2',sans-serif;font-size:13px;cursor:pointer;
    box-shadow:0 3px 0 #E2E8F0;transition:all .15s ease;
  }
  .mode-chip.active{background:var(--purple);color:#fff;box-shadow:0 3px 0 var(--purple-dark);}

  .blank-slot{display:inline-block;min-width:78px;height:1.05em;border-bottom:5px solid var(--pink);vertical-align:middle;margin:0 4px;}

  .chrono-timer-track{height:12px;border-radius:999px;background:#F0ECFF;overflow:hidden;margin:6px 0 26px;}
  .chrono-timer-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));width:100%;}
  .chrono-statement{
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:clamp(19px,4.4vw,27px);line-height:1.45;
    color:var(--ink);margin:10px 0 30px;text-align:center;
  }
  .chrono-btns{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .chrono-btn{border:none;border-radius:20px;padding:24px;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:20px;cursor:pointer;transition:all .12s ease;}
  .chrono-btn.true{background:var(--green);color:#fff;box-shadow:0 5px 0 var(--green-dark);}
  .chrono-btn.false{background:var(--red);color:#fff;box-shadow:0 5px 0 var(--red-dark);}
  .chrono-btn:hover:not(.disabled){transform:translateY(-2px);}
  .chrono-btn:active:not(.disabled){transform:translateY(3px);}
  .chrono-btn.disabled{opacity:.55;cursor:default;}

  .dict-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:0 0 14px;}
  .view-toggle{display:flex;gap:0;border-radius:999px;overflow:hidden;box-shadow:0 3px 0 #E2E8F0;}
  .view-toggle-btn{
    border:none;background:#F1F5F9;color:var(--purple-dark);padding:8px 16px;font-weight:800;
    font-family:'Nunito',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s ease;
  }
  .view-toggle-btn.active{background:var(--purple);color:#fff;}

  .dict-list{display:flex;flex-direction:column;gap:6px;}
  .dict-row{
    display:grid;grid-template-columns:32px 1fr auto auto;gap:10px;align-items:center;
    background:#F8FAFC;border-radius:12px;padding:8px 12px;
  }
  .dict-row-fr{font-weight:800;color:var(--ink);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dict-row-ar{font-family:'Changa',sans-serif;direction:rtl;color:var(--purple);font-weight:700;font-size:15px;white-space:nowrap;}
  .dict-row-badge{font-size:11px;white-space:nowrap;}

  .hist-list{display:flex;flex-direction:column;gap:10px;margin-top:18px;text-align:left;}
  .hist-row{
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    background:#F8FAFC;border-radius:16px;padding:14px 18px;
  }
  .hist-title{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:17px;color:var(--ink);}
  .hist-score{margin-left:8px;font-size:15px;}
  .hist-score.gold{color:#B45309;}
  .hist-score.good{color:var(--green-dark);}
  .hist-score.warn{color:var(--red-dark);}
  .hist-sub{font-size:12.5px;color:var(--text-dim);font-weight:700;margin-top:2px;}
  .hist-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .hist-btn{
    border:none;background:#fff;color:var(--purple-dark);padding:8px 13px;border-radius:999px;
    font-weight:800;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;
    box-shadow:0 3px 0 #E2E8F0;transition:all .12s ease;
  }
  .hist-btn:hover{transform:translateY(-1px);}
  .hist-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #E2E8F0;}
  .hist-btn.danger{color:var(--red-dark);}

  .stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0 10px;}
  .stat-box{background:#F1F5F9;border-radius:16px;padding:12px 8px;text-align:center;box-shadow:0 3px 0 #E2E8F0;}
  .stat-box.gold{background:#FEF3C7;box-shadow:0 3px 0 #FCD34D;}
  .stat-box.warn{background:#FEE2E2;box-shadow:0 3px 0 #FECACA;}
  .stat-num{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:22px;color:var(--ink);line-height:1.1;}
  .stat-lbl{font-size:11px;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}

  @media (max-width:640px){
    body{padding:18px 10px 60px;}
    .card{padding:24px 16px;border-radius:22px;}
    .csv-btn{padding:8px 12px;font-size:11.5px;}
    .mode-chip{padding:8px 13px;font-size:12px;}
    .filter-chip{padding:6px 12px;font-size:11px;}
    .chip{padding:7px 13px;font-size:12px;}
    #blockGrid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr)) !important;}
    .chrono-statement{font-size:clamp(17px,5vw,22px);}
    .chrono-btn{padding:18px;font-size:17px;}
    .stats-strip{grid-template-columns:repeat(2,1fr);}
    .search-input{font-size:16px;} /* évite le zoom auto iOS */
    .dict-row{grid-template-columns:28px 1fr auto;}
    .dict-row-badge{display:none;}
    .hist-row{flex-direction:column;align-items:flex-start;}
  }

  /* ===== Mode focus test : tout tient dans l'écran, pas de scroll ===== */
  body.quiz-active .csv-status{ display:none; }
  body.quiz-active .navbar{ margin-bottom:10px; }
  body.quiz-active{ padding-top:14px; }
  body.quiz-active .scoreboard{ margin:6px 0 8px; }
  body.quiz-active .progress-track{ margin:10px 0 14px; }
  body.quiz-active .card{
    max-height:calc(100dvh - 130px);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    scroll-behavior:smooth;
  }
  body.quiz-active .card::-webkit-scrollbar{ width:6px; }
  body.quiz-active .card::-webkit-scrollbar-thumb{ background:rgba(124,58,237,0.3); border-radius:3px; }
  body.quiz-active .cat-tag{ margin-bottom:12px; }
  body.quiz-active .word-fr{ margin:2px 0 8px; }
  body.quiz-active .question-line{ margin:4px 0 16px; }
  body.quiz-active .reveal{ margin-top:18px; padding-top:16px; }
  body.quiz-active .next-btn{ margin-top:16px; }

  @media (max-width:640px){
    body.quiz-active .card{
      max-height:calc(100dvh - 108px);
      padding:18px 14px;
    }
    body.quiz-active .word-fr{ font-size:clamp(24px,7vw,34px); }
    body.quiz-active .opt{ padding:12px 15px; font-size:14px; }
    body.quiz-active .options{ gap:9px; }
  }

  .confetti-piece{
    position:fixed;top:-20px;width:9px;height:9px;pointer-events:none;z-index:9999;border-radius:2px;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(105vh) translateX(var(--drift,0px)) rotate(720deg);opacity:0.4;}
  }

  @media (max-width:480px){ .card{padding:28px 20px;} .seal{flex-direction:column;align-items:flex-start;} }

  /* ============ 🦉 MASCOTTE & ANIMATIONS DUO ============ */
  .mascot-zone{
    display:flex;align-items:flex-end;gap:12px;justify-content:center;
    margin:0 0 -18px 0;position:relative;z-index:5;min-height:84px;
    pointer-events:none;
  }
  .mascot-zone{ display:none; }
  body.quiz-active .mascot-zone{ display:flex; }
  .mascot{ transform-origin:bottom center; animation:mascotIdle 3.2s ease-in-out infinite; filter:drop-shadow(0 8px 10px rgba(0,0,0,0.18)); }
  .mascot svg{ display:block; }
  .m-shadow{ fill:rgba(0,0,0,0.12); }
  @keyframes mascotIdle{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-6px) rotate(-1.5deg); }
  }
  .mascot.happy{ animation:mascotJump .6s cubic-bezier(.28,1.5,.5,1) 1; }
  @keyframes mascotJump{
    0%{ transform:translateY(0) scale(1); }
    35%{ transform:translateY(-26px) scale(1.12,0.92); }
    60%{ transform:translateY(0) scale(0.94,1.08); }
    100%{ transform:translateY(0) scale(1); }
  }
  .mascot.sad{ animation:mascotSad .5s ease 1; }
  @keyframes mascotSad{
    0%{ transform:translateY(0) rotate(0); }
    25%{ transform:translateY(4px) rotate(-6deg) scale(0.96); }
    50%{ transform:translateY(4px) rotate(6deg) scale(0.96); }
    75%{ transform:translateY(4px) rotate(-4deg); }
    100%{ transform:translateY(0) rotate(0); }
  }
  .mascot.happy .m-pupil{ animation:pupilJoy .5s ease; }
  @keyframes pupilJoy{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-2px);} }
  .mascot.happy .m-glasses{ animation:glassShine .6s ease; transform-origin:center; }
  @keyframes glassShine{ 0%,100%{ filter:none;} 50%{ filter:drop-shadow(0 0 8px rgba(61,214,245,0.9)); } }
  .m-blink{ animation:blink 4s infinite; transform-origin:center; }

  .mascot-bubble{
    background:#fff;color:var(--ink);font-family:'Baloo 2',sans-serif;font-weight:800;font-size:14px;
    padding:8px 14px;border-radius:16px 16px 16px 4px;box-shadow:0 4px 0 rgba(0,0,0,0.12);
    max-width:210px;opacity:0;transform:translateY(8px) scale(.9);transition:all .25s cubic-bezier(.28,1.4,.5,1);
    position:relative;margin-bottom:16px;
  }
  .mascot-bubble.show{ opacity:1;transform:translateY(0) scale(1); }
  .mascot-bubble.ok{ background:#D7FFB8;color:#3A7A00; }
  .mascot-bubble.ko{ background:#FFE0E0;color:#B02A2A; }

  /* Carte qui entre en glissant, façon deck de cartes */
  .card{ animation:cardIn .38s cubic-bezier(.22,1.2,.4,1); }
  body.quiz-active #quizCard{ animation:cardSwap .34s cubic-bezier(.22,1.2,.4,1); }
  @keyframes cardIn{ from{ opacity:0; transform:translateY(16px) scale(.97);} to{ opacity:1; transform:translateY(0) scale(1);} }
  @keyframes cardSwap{ from{ opacity:0; transform:translateX(28px) rotate(1.5deg);} to{ opacity:1; transform:translateX(0) rotate(0);} }

  /* Options : apparition en cascade + gros feedback tactile */
  body.quiz-active .opt{ animation:optIn .3s ease backwards; }
  body.quiz-active .opt:nth-child(1){ animation-delay:.03s; }
  body.quiz-active .opt:nth-child(2){ animation-delay:.09s; }
  body.quiz-active .opt:nth-child(3){ animation-delay:.15s; }
  body.quiz-active .opt:nth-child(4){ animation-delay:.21s; }
  @keyframes optIn{ from{ opacity:0; transform:translateX(-14px);} to{ opacity:1; transform:translateX(0);} }
  .opt.correct{ animation:correctPulse .5s ease; }
  @keyframes correctPulse{
    0%{ transform:scale(1);} 30%{ transform:scale(1.04);}
    45%{ transform:scale(.99);} 60%{ transform:scale(1.02);} 100%{ transform:scale(1);}
  }

  /* Barre de progression rayée qui bouge, avec petit éclat */
  .progress-track{ position:relative; overflow:hidden; }
  .progress-fill{
    background-image:linear-gradient(45deg, rgba(255,255,255,.28) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.28) 50%, rgba(255,255,255,.28) 75%, transparent 75%, transparent);
    background-size:22px 22px;
    animation:stripes 0.7s linear infinite;
  }
  @keyframes stripes{ from{ background-position:0 0; } to{ background-position:22px 0; } }
  .progress-fill::after{
    content:"";position:absolute;top:0;right:0;bottom:0;width:20px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.6));
  }

  /* Étoiles / éclats de célébration */
  .burst-star{
    position:fixed;z-index:9999;pointer-events:none;font-size:24px;
    animation:burstStar .9s ease-out forwards;
  }
  @keyframes burstStar{
    0%{ transform:translate(0,0) scale(.4) rotate(0); opacity:1; }
    100%{ transform:translate(var(--bx,0), var(--by,0)) scale(1.2) rotate(var(--br,180deg)); opacity:0; }
  }

  /* Chip streak qui pulse quand elle monte */
  .chip.streak-up{ animation:streakPop .5s cubic-bezier(.28,1.5,.5,1); }
  @keyframes streakPop{ 0%{ transform:scale(1);} 40%{ transform:scale(1.25) rotate(-3deg);} 100%{ transform:scale(1);} }

  /* Titre qui respire */
  h1{ animation:titleBreath 4s ease-in-out infinite; }
  @keyframes titleBreath{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.015);} }

  /* Boutons de la barre : petit rebond au survol */
  .csv-btn{ transition:transform .12s cubic-bezier(.28,1.5,.5,1), background .15s, box-shadow .15s; }
  .csv-btn:hover{ transform:translateY(-2px) rotate(-1deg); }
  .csv-btn:active{ transform:translateY(1px) scale(.96); }

  /* Grande étiquette de feedback qui claque */
  .big-feedback{
    font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(22px,5vw,30px);
    text-align:center;margin:0 0 6px;animation:feedbackPop .45s cubic-bezier(.28,1.6,.5,1);
  }
  .big-feedback.ok{ color:var(--green-dark); }
  .big-feedback.ko{ color:var(--red-dark); }
  @keyframes feedbackPop{ 0%{ transform:scale(.5); opacity:0;} 60%{ transform:scale(1.12);} 100%{ transform:scale(1); opacity:1;} }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001s !important; animation-iteration-count:1 !important; }
  }

  /* ============ 🎨 NAVBAR / LOGO / MENU VocabVISION ============ */
  .navbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:rgba(255,255,255,0.08);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:11px 16px;margin-bottom:18px;
    position:relative;z-index:5;box-shadow:0 10px 30px -16px rgba(0,0,0,0.55);
  }
  .brand{ display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none; }
  .brand-logo{ display:flex;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.3)); transition:transform .2s cubic-bezier(.28,1.5,.5,1); }
  .brand:hover .brand-logo{ transform:rotate(-6deg) scale(1.06); }
  .brand-word{ font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(19px,4.5vw,24px);color:#fff;letter-spacing:.005em;line-height:1;white-space:nowrap; }
  .brand-accent{
    background:linear-gradient(90deg,#5EEAD4,#38BDF8);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }

  /* Hamburger animé */
  .menu-toggle{
    display:inline-flex;flex-direction:column;justify-content:center;gap:5px;
    border:none;background:rgba(255,255,255,0.14);width:46px;height:46px;border-radius:13px;cursor:pointer;
    padding:0 13px;flex:none;transition:background .15s;
  }
  .menu-toggle:hover{ background:rgba(255,255,255,0.24); }
  .menu-toggle span{ display:block;height:2.5px;border-radius:3px;background:#fff;transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .2s; }
  body.menu-open .menu-toggle span:nth-child(1){ transform:translateY(7.5px) rotate(45deg); }
  body.menu-open .menu-toggle span:nth-child(2){ opacity:0; }
  body.menu-open .menu-toggle span:nth-child(3){ transform:translateY(-7.5px) rotate(-45deg); }

  /* Drawer (tiroir) — enfant direct du body, empilement fiable */
  .menu{
    position:fixed;top:0;right:0;bottom:0;width:min(88vw,340px);
    background:#FFFFFF;
    display:flex;flex-direction:column;gap:2px;
    padding:0 0 24px;transform:translateX(102%);transition:transform .32s cubic-bezier(.4,0,.2,1);
    z-index:1000;box-shadow:-20px 0 60px -14px rgba(15,23,42,0.5);overflow-y:auto;
  }
  body.menu-open .menu{ transform:translateX(0); }
  .menu-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 20px 16px;border-bottom:1px solid #EEF1F6;margin-bottom:6px;
    position:sticky;top:0;background:#fff;z-index:1;
  }
  .menu-head-brand{ display:flex;align-items:center;gap:9px; }
  .menu-head-title{ font-family:'Baloo 2',sans-serif;font-weight:800;font-size:18px;color:var(--ink); }
  .menu-close{
    border:none;background:#F1F5F9;color:var(--text);width:34px;height:34px;border-radius:10px;
    font-size:15px;cursor:pointer;transition:background .15s;
  }
  .menu-close:hover{ background:#E2E8F0; }
  .menu-group{ padding:4px 12px 8px; }
  .menu-group + .menu-group{ border-top:1px solid #F1F5F9;padding-top:10px; }
  .menu-label{
    font-family:'Nunito',sans-serif;font-weight:800;font-size:10.5px;letter-spacing:.10em;text-transform:uppercase;
    color:var(--text-dim);padding:8px 12px 6px;
  }
  .menu-item{
    display:flex;align-items:center;gap:13px;width:100%;text-align:left;
    border:none;background:transparent;color:var(--text);padding:12px 12px;border-radius:11px;
    font-family:'Nunito',sans-serif;font-weight:700;font-size:14.5px;cursor:pointer;
    transition:background .14s,color .14s;
  }
  .menu-item:hover{ background:#EEF2FF;color:var(--purple); }
  .menu-item.danger{ color:var(--red-dark); }
  .menu-item.danger:hover{ background:#FEF2F2; }
  .mi-ic{ font-size:17px;width:22px;text-align:center;flex:none; }

  .menu-backdrop{
    display:none;position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:999;
    opacity:0;transition:opacity .3s;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  }
  body.menu-open .menu-backdrop{ display:block;opacity:1; }

  /* ============ 🚀 HERO (écran d'accueil) ============ */
  .hero{ text-align:center;padding:6px 0 4px; }
  .hero-badge{
    display:inline-block;font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;letter-spacing:.07em;
    text-transform:uppercase;color:var(--purple);background:#EEF2FF;padding:6px 14px;border-radius:999px;
    margin-bottom:14px;border:1px solid #E0E7FF;
  }
  .hero-title{
    font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(30px,6.5vw,50px);line-height:1.03;
    color:var(--ink);margin:0 0 10px;
  }
  .hero-title .grad{
    background:linear-gradient(90deg,var(--purple),var(--pink) 55%,var(--green));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .hero-sub{ font-size:15.5px;color:var(--text-dim);font-weight:700;max-width:440px;margin:0 auto 18px; }
  .hero-mascot{ width:96px;height:96px;margin:0 auto 6px;animation:mascotIdle 3.2s ease-in-out infinite; }

  /* ============ 🔥 OBJECTIF QUOTIDIEN ============ */
  .goal-card{
    background:linear-gradient(135deg,#EEF2FF,#F0FDFA);
    border:1px solid #E0E7FF;border-radius:18px;padding:16px 18px;margin:6px 0 14px;
  }
  .goal-top{ display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px; }
  .goal-streak{ display:flex;align-items:baseline;gap:7px; }
  .goal-fire{ font-size:26px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.15)); }
  .goal-streak-num{ font-family:'Baloo 2',sans-serif;font-weight:800;font-size:30px;color:var(--purple);line-height:1; }
  .goal-streak-lbl{ font-weight:800;font-size:13px;color:var(--text-dim); }
  .goal-status{ font-family:'Nunito',sans-serif;font-weight:800;font-size:12.5px;padding:7px 13px;border-radius:999px;white-space:nowrap; }
  .goal-status.done{ background:#D1FAE5;color:var(--green-dark); }
  .goal-status.todo{ background:#FEF3C7;color:#B45309; }
  .week-strip{ display:grid;grid-template-columns:repeat(7,1fr);gap:6px; }
  .day-cell{
    display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;border-radius:12px;
    background:#fff;border:1px solid #EEF1F6;
  }
  .day-cell.met{ background:linear-gradient(160deg,#FFF7ED,#FFEDD5);border-color:#FED7AA; }
  .day-cell.today{ border:2px solid var(--purple); }
  .day-lbl{ font-size:10px;font-weight:800;color:var(--text-dim);text-transform:uppercase; }
  .day-dot{ font-size:15px;line-height:1;height:17px; }
  .day-num{ font-size:11px;font-weight:800;color:var(--text); }
  .goal-foot{ margin-top:11px;font-size:12px;font-weight:700;color:var(--text-dim);text-align:center; }

  .goal-toast{
    position:fixed;left:50%;top:22px;transform:translateX(-50%) translateY(-140%);
    display:flex;align-items:center;gap:12px;z-index:2000;
    background:#fff;border-radius:16px;padding:14px 20px;box-shadow:0 16px 40px -12px rgba(15,23,42,0.5);
    border:1px solid #FED7AA;max-width:90vw;transition:transform .4s cubic-bezier(.28,1.4,.5,1);
  }
  .goal-toast.show{ transform:translateX(-50%) translateY(0); }
  .goal-toast-fire{ font-size:34px;line-height:1;animation:mascotJump .7s ease; }
  .goal-toast-title{ font-family:'Baloo 2',sans-serif;font-weight:800;font-size:15px;color:var(--ink); }
  .goal-toast-sub{ font-size:12.5px;font-weight:700;color:var(--text-dim);margin-top:2px; }

  /* ============ 🎤 MODE PRONONCIATION ============ */
  .speak-arabic{
    font-family:'Changa',sans-serif;direction:rtl;text-align:center;color:var(--purple);
    font-size:clamp(40px,10vw,64px);font-weight:700;margin:10px 0 4px;line-height:1.2;
  }
  .speak-ar-btn{
    display:block;margin:0 auto 10px;border:none;background:#EEF2FF;color:var(--purple);
    font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:8px 16px;border-radius:999px;cursor:pointer;
    transition:background .15s;
  }
  .speak-ar-btn:hover{ background:#E0E7FF; }
  .mic-zone{ display:flex;flex-direction:column;align-items:center;gap:10px;margin:18px 0 8px; }
  .mic-btn{
    width:88px;height:88px;border-radius:50%;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--purple),var(--pink));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 26px -8px rgba(79,70,229,0.6);transition:transform .15s;
    position:relative;
  }
  .mic-btn:hover{ transform:scale(1.05); }
  .mic-btn:active{ transform:scale(.96); }
  .mic-btn.disabled{ opacity:.5;pointer-events:none; }
  .mic-btn.listening{ animation:micPulse 1.1s ease-in-out infinite; }
  .mic-btn.listening::after{
    content:"";position:absolute;inset:-6px;border-radius:50%;border:3px solid rgba(14,165,164,0.6);
    animation:micRing 1.1s ease-out infinite;
  }
  @keyframes micPulse{ 0%,100%{ box-shadow:0 10px 26px -8px rgba(79,70,229,0.6);} 50%{ box-shadow:0 10px 34px -6px rgba(14,165,164,0.85);} }
  @keyframes micRing{ 0%{ transform:scale(1);opacity:.8;} 100%{ transform:scale(1.35);opacity:0;} }
  .mic-hint{ font-weight:800;font-size:13.5px;color:var(--text-dim);text-align:center; }
  .mic-transcript{ font-weight:700;font-size:13px;color:var(--purple);min-height:18px;text-align:center; }
  .speak-actions{ display:flex;gap:10px;justify-content:center;margin-top:6px;flex-wrap:wrap; }

  /* Notes par mode sur les tuiles de bloc */
  .bmodes{ display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:8px; }
  .bmode{
    display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:800;color:var(--text-dim);
    background:#F1F5F9;padding:2px 6px;border-radius:7px;
  }
  .bmode b{ color:var(--text);font-weight:800; }
  .bmode.ok{ background:#D1FAE5;color:var(--green-dark); }
  .bmode.ok b{ color:var(--green-dark); }
  .block-pass{ font-size:11.5px;font-weight:800;margin-top:4px; }
  .block-pass.ok{ color:var(--green-dark); }
  .block-pass.todo{ color:#B45309; }
  .block-locked{ background:#F8FAFC !important; }

  .pass-banner{ margin:16px auto 4px;max-width:460px;padding:12px 16px;border-radius:14px;font-weight:800;font-size:14px; }
  .pass-banner.ok{ background:#D1FAE5;color:var(--green-dark); }
  .pass-banner.todo{ background:#FEF3C7;color:#B45309; }
  .pm-summary{ max-width:420px;margin:16px auto 0;text-align:left;background:#F8FAFC;border-radius:14px;padding:12px 16px; }
  .pm-title{ font-family:'Baloo 2',sans-serif;font-weight:800;font-size:14px;color:var(--ink);margin-bottom:8px;text-align:center; }
  .pm-row{ display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #EEF1F6;font-weight:700;font-size:13.5px;color:var(--text); }
  .pm-row:last-child{ border-bottom:none; }
  .pm-score{ font-weight:800; }
  .pm-score.ok{ color:var(--green-dark); }
  .pm-score.todo{ color:#B45309; }

  /* ============ ⏳ INDICATEUR DE SYNCHRO VocabVISION ============ */
  .sync-overlay{
    position:fixed;inset:0;z-index:3000;display:none;align-items:center;justify-content:center;
    background:radial-gradient(600px 400px at 50% 40%, rgba(49,46,129,0.96), rgba(15,23,42,0.98));
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  }
  .sync-overlay.show{ display:flex;animation:syncFade .3s ease; }
  .sync-overlay.hide{ animation:syncFadeOut .4s ease forwards; }
  @keyframes syncFade{ from{opacity:0;} to{opacity:1;} }
  @keyframes syncFadeOut{ from{opacity:1;} to{opacity:0;} }
  .sync-box{ display:flex;flex-direction:column;align-items:center;gap:14px; }
  .sync-logo{ position:relative;width:92px;height:92px;display:flex;align-items:center;justify-content:center; }
  .sync-logo > svg:first-child{ position:absolute;animation:syncBob 2s ease-in-out infinite;filter:drop-shadow(0 6px 14px rgba(0,0,0,0.4)); }
  .sync-ring{ position:absolute;animation:syncSpin 1s linear infinite; }
  @keyframes syncSpin{ to{ transform:rotate(360deg); } }
  @keyframes syncBob{ 0%,100%{ transform:translateY(0) scale(1);} 50%{ transform:translateY(-4px) scale(1.04);} }
  .sync-pupil{ animation:syncBlink 2.4s infinite; transform-origin:center; }
  @keyframes syncBlink{ 0%,92%,100%{ transform:scaleY(1);} 96%{ transform:scaleY(0.1);} }
  .sync-word{ font-family:'Baloo 2',sans-serif;font-weight:800;font-size:24px;color:#fff;letter-spacing:.01em; }
  .sync-msg{ font-family:'Nunito',sans-serif;font-weight:700;font-size:13.5px;color:rgba(255,255,255,0.75); }
  .sync-msg::after{ content:'';animation:syncDots 1.4s steps(4,end) infinite; }
  @keyframes syncDots{ 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';} }

  /* ============ 🧩 JEU DE PAIRES ============ */
  .pairs-grid{ display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px; }
  .pairs-col{ display:flex;flex-direction:column;gap:10px; }
  .pair-tile{
    border:none;border-radius:14px;padding:16px 12px;cursor:pointer;
    background:#F1F5F9;color:var(--text);font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;
    box-shadow:0 4px 0 #E2E8F0;transition:transform .1s,background .15s,box-shadow .1s;min-height:56px;
    display:flex;align-items:center;justify-content:center;text-align:center;
  }
  .pair-tile.ar{ font-family:'Changa',sans-serif;direction:rtl;font-size:19px;color:var(--purple); }
  .pair-tile:hover:not(.matched){ transform:translateY(-1px);background:#E8EDFF; }
  .pair-tile:active:not(.matched){ transform:translateY(2px);box-shadow:0 2px 0 #E2E8F0; }
  .pair-tile.selected{ background:var(--purple);color:#fff;box-shadow:0 4px 0 var(--purple-dark); }
  .pair-tile.selected.ar{ color:#fff; }
  .pair-tile.matched{ background:#D1FAE5;color:var(--green-dark);box-shadow:0 4px 0 #6EE7B7;opacity:.6;pointer-events:none; }
  .pair-tile.matched.ar{ color:var(--green-dark); }
  .pair-tile.pair-wrong{ background:#FEE2E2;color:var(--red-dark);box-shadow:0 4px 0 #FCA5A5;animation:pairShake .4s ease; }
  @keyframes pairShake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }

  .combo-chip{ background:linear-gradient(135deg,#FEF3C7,#FDE68A);color:#B45309; }
  .pass-banner.flawless{
    background:linear-gradient(135deg,#FDE68A,#FCA5A5,#C4B5FD);background-size:200% 100%;
    color:#7C2D12;animation:flawlessShine 3s linear infinite;
  }

  .quests-head{ display:flex;align-items:center;justify-content:space-between;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:15px;color:var(--ink);margin-bottom:10px; }
  .quests-xp{ background:#FEF3C7;color:#B45309;font-size:12.5px;padding:4px 11px;border-radius:999px; }
  .quests-alldone{ background:#D1FAE5;color:var(--green-dark);font-weight:800;font-size:13px;text-align:center;padding:8px;border-radius:12px;margin-bottom:10px; }
  .quest-row{ display:flex;align-items:center;gap:12px;padding:7px 0; }
  .quest-ic{ font-size:22px;width:30px;text-align:center;flex:none; }
  .quest-main{ flex:1;min-width:0; }
  .quest-label{ font-weight:800;font-size:13px;color:var(--text);margin-bottom:5px; }
  .quest-bar{ position:relative;height:20px;border-radius:999px;background:#EEF1F6;overflow:hidden; }
  .quest-bar-fill{ height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),#5EEAD4);transition:width .5s cubic-bezier(.34,1.56,.64,1); }
  .quest-bar-txt{ position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--ink); }

  .recap-meta{ display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px; }
  .recap-meta-pill{ background:#F1F5F9;color:var(--text);font-weight:800;font-size:13px;padding:7px 15px;border-radius:999px; }

  .replay-modes{ display:flex;flex-wrap:wrap;gap:8px;justify-content:center; }
  .replay-mode-btn{
    border:none;background:#F1F5F9;color:var(--text);font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;

    display:inline-flex;align-items:center;gap:7px;

  .replay-mode-btn:hover{ transform:translateY(-2px);background:#E8EDFF; }
  .replay-mode-btn:active{ transform:translateY(1px);box-shadow:0 2px 0 #E2E8F0; }
  .replay-mode-btn.current{ background:#EEF2FF;box-shadow:0 3px 0 #C7D2FE; }

  .mult-chip{ background:linear-gradient(135deg,#FDE68A,#FBBF24);color:#7C2D12;animation:multPulse 1.4s ease-in-out infinite; }
  @keyframes multPulse{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.06);} }
  .mult-banner{ background:linear-gradient(135deg,#FEF3C7,#FDE68A);color:#B45309;font-weight:800;font-size:12.5px;text-align:center;padding:8px 12px;border-radius:12px;margin-bottom:10px; }

  /* Mascotte plus vivante */
  .mascot{ animation:mascotIdle 2.6s ease-in-out infinite; }
  @keyframes mascotIdle{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    25%{ transform:translateY(-5px) rotate(-2.5deg); }
    50%{ transform:translateY(-2px) rotate(0deg); }
    75%{ transform:translateY(-5px) rotate(2.5deg); }
  }
  .mascot.wave{ animation:mascotWave .8s ease; }
  @keyframes mascotWave{ 0%,100%{ transform:rotate(0);} 20%{ transform:rotate(-12deg);} 50%{ transform:rotate(10deg);} 70%{ transform:rotate(-6deg);} }
  .mascot.talking{ animation:mascotTalkA .35s ease-in-out infinite; }
  @keyframes mascotTalkA{ 0%,100%{ transform:translateY(0) scale(1,1);} 50%{ transform:translateY(-2px) scale(1.03,0.97);} }
  .mascot.dance{ animation:mascotDanceA 1.3s ease; }
  @keyframes mascotDanceA{
    0%{ transform:rotate(0) translateY(0);} 15%{ transform:rotate(-10deg) translateY(-6px);}

  .repeat-sentence{
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:clamp(20px,4.6vw,28px);text-align:center;
    color:var(--ink);background:#F1F5F9;border-radius:16px;padding:22px 18px;margin:6px 0 10px;line-height:1.5;
  }
  .repeat-sentence.hidden{ letter-spacing:.3em;color:var(--purple);font-size:26px; }

  /* ============ 💬 MODE DIALOGUE ============ */
  .dlg{ display:flex;flex-direction:column;gap:12px;margin:8px 0 16px; }
  .dlg-line{ display:flex;align-items:flex-end;gap:8px; }

  .dlg-avatar{ width:40px;height:40px;border-radius:50%;background:#EEF2FF;display:flex;align-items:center;justify-content:center;font-size:22px;flex:none; }
  .dlg-line.right .dlg-avatar{ background:#D1FAE5; }
  .dlg-bubble{
    background:#F1F5F9;color:var(--text);padding:12px 15px;border-radius:16px 16px 16px 4px;
    font-weight:700;font-size:15px;max-width:78%;line-height:1.5;
  }
  .dlg-bubble.you{ background:linear-gradient(135deg,#EEF2FF,#E0E7FF);border-radius:16px 16px 4px 16px;color:var(--ink); }
  .web-ex{ margin-top:8px; }
  .web-ex-card{ background:#EFF6FF;border:1px solid #BFDBFE;border-radius:12px;padding:12px 14px;font-weight:700;font-size:14px;color:#1E3A8A;display:flex;align-items:center;gap:8px;flex-wrap:wrap; }

function loadWordStats(){
  try{
    const raw = localStorage.getItem(WORD_STATS_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveWordStats(){
  try{ localStorage.setItem(WORD_STATS_KEY, JSON.stringify(wordStats)); }catch(e){}
}
function recordWordStat(fr, isCorrect){
  const key = fr.toLowerCase();
  if(!wordStats[key]) wordStats[key] = { correct:0, wrong:0 };
  if(isCorrect){ wordStats[key].correct++; } else { wordStats[key].wrong++; }
  saveWordStats();
}
function getWordBadge(fr){

  if(!s || (s.correct === 0 && s.wrong === 0)){
    return `<span class="rc-status" style="color:var(--text-dim);">nouveau</span>`;
  }
  const total = s.correct + s.wrong;
  return s.wrong === 0
    ? `<span class="rc-status first">✓ ${s.correct}/${total}</span>`
    : `<span class="rc-status retry">⚠ ${s.correct}/${total}</span>`;
}

function xpMultiplier(){

/* Série de jours consécutifs jusqu'à aujourd'hui (ou hier si pas encore fait aujourd'hui). */
function computeStreak(){
  let streak = 0;
  const d = new Date();
  // si l'objectif d'aujourd'hui n'est pas atteint, la série peut encore tenir via hier
  if(!goalMetOn(todayKey(d))){ d.setDate(d.getDate() - 1); }
  while(goalMetOn(todayKey(d))){
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}
function computeBestStreak(){
  const keys = Object.keys(dailyLog).filter(k => goalMetOn(k)).sort();
  let best = 0, cur = 0, prev = null;
  for(const k of keys){
    if(prev){
      const diff = (new Date(k) - new Date(prev)) / 86400000;
      cur = (Math.round(diff) === 1) ? cur + 1 : 1;
    } else { cur = 1; }
    if(cur > best) best = cur;
    prev = k;
  }
  return best;
}

  }

}

const FEMALE_HINTS = ['female','femme','amelie','amélie','audrey','aurelie','aurélie','hortense','julie','marie','virginie','denise','celine','céline','charline','brigitte','elise','léa','lea','eloise','éloise','sabrina','vlasta','zariyah','salma','laila','layla','amina','hoda','naira','sana','fatima','google français','google arabic','samira'];
const MALE_HINTS = ['male','homme','thomas','paul','nicolas','henri','claude','mathieu','guillaume','jacques','daniel','tarik','hamed','maged','naayf','nizar','omar','ahmed','yassin','rachid'];

function classifyGender(v){
  const n = (v.name || '').toLowerCase();
  for(const h of FEMALE_HINTS){ if(n.includes(h)) return 'f'; }
  for(const h of MALE_HINTS){ if(n.includes(h)) return 'm'; }
  return null;
}
function voiceQuality(v){
  const n = (v.name || '').toLowerCase();
  let s = 0;
  if(n.includes('natural') || n.includes('neural')) s += 100; // voix neurales (Edge) = top qualité
  if(n.includes('online')) s += 40;
  if(n.includes('google')) s += 30;
  if(n.includes('microsoft')) s += 15;
  if(v.localService === false) s += 10;
  return s;
}
function getVoicesFor(langPrefix){
  if(!_voices.length) refreshVoices();
  return _voices
    .filter(v => (v.lang || '').toLowerCase().startsWith(langPrefix))
    .sort((a,b) => voiceQuality(b) - voiceQuality(a));
}
/* Choisit une voix pour la langue, en préférant un genre donné (ou aléatoire). */
function pickVoice(langPrefix, gender){
  const voices = getVoicesFor(langPrefix);
  if(!voices.length) return null;
  const g = gender || (Math.random() < 0.5 ? 'f' : 'm');
  const sameGender = voices.filter(v => classifyGender(v) === g);
  if(sameGender.length) return sameGender[0];       // meilleure voix du genre voulu
  const otherGender = voices.filter(v => classifyGender(v) === (g === 'f' ? 'm' : 'f'));
  if(otherGender.length) return otherGender[0];      // sinon l'autre genre
  return voices[0];                                  // sinon la meilleure dispo
}

function speak(text, lang){
  if(!speechAvailable || !text) return;
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const langCode = lang || 'fr-FR';
    u.lang = langCode;
    const prefix = langCode.slice(0,2).toLowerCase();
    const v = pickVoice(prefix); // genre aléatoire à chaque fois
    if(v){ u.voice = v; u.lang = v.lang; }
    u.rate = 0.96;
    u.pitch = 1.0;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

let audioCtx = null;
function getAudioCtx(){
  try{
    if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
    return audioCtx;
  }catch(e){ return null; }
}

function playChime(notes, opts){
  const ctx = getAudioCtx();
  if(!ctx) return;
  opts = opts || {};
  const noteDur = opts.noteDur || 0.14;
  const gap = opts.gap || noteDur;
  const volume = opts.volume || 0.2;
  let t = ctx.currentTime;
  notes.forEach(freq => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = opts.type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(volume, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + noteDur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + noteDur + 0.03);
    t += gap;
  });
}

/* ---------- CSV parsing / export ---------- */
function detectSeparator(headerLine){
  const counts = { ';': (headerLine.match(/;/g)||[]).length, ',': (headerLine.match(/,/g)||[]).length, '\t': (headerLine.match(/\t/g)||[]).length };
  let best = ';', bestN = -1;
  for(const s of [';', ',', '\t']){ if(counts[s] > bestN){ bestN = counts[s]; best = s; } }
  return bestN > 0 ? best : ';';
}

/* Analyse complète : renvoie mots valides + diagnostic pour l'aperçu */
function analyzeCSV(text){
  const rawLines = text.replace(/\r/g,'').split('\n');
  const lines = rawLines.filter(l => l.trim().length > 0);
  const result = {
    words: [], duplicates: 0, invalid: [], total: 0,
    sep: ';', headerOk: false, missing: [], sample: []
  };
  if(lines.length < 2){ result.error = 'Fichier vide ou sans données (il faut une ligne d\'en-tête + au moins un mot).'; return result; }

  const sep = detectSeparator(lines[0]);
  result.sep = sep;
  const header = lines[0].split(sep).map(h => h.trim().toLowerCase());
  const findCol = (a, b) => { const i = header.indexOf(a); return i >= 0 ? i : header.indexOf(b); };
  const frI = findCol('fr', 'français');
  const arI = findCol('ar', 'arabe');
  const defI = findCol('def', 'définition');
  const exI = findCol('ex', 'exemple');
  const catI = findCol('cat', 'catégorie');

  if(frI < 0) result.missing.push('fr (mot français)');
  if(defI < 0) result.missing.push('def (définition)');
  result.headerOk = result.missing.length === 0;
  result.colMap = { frI, arI, defI, exI, catI };

  if(!result.headerOk){
    result.error = `Colonnes manquantes : ${result.missing.join(', ')}. Première ligne détectée : « ${escapeHtml(lines[0].slice(0,80))} » (séparateur « ${sep === '\t' ? 'tabulation' : sep} »).`;
    return result;
  }

  const seen = new Set();
  for(let i=1;i<lines.length;i++){
    result.total++;
    const parts = lines[i].split(sep);
    const fr = (parts[frI] || '').trim();
    const ar = (arI >= 0 ? (parts[arI] || '') : '').trim();
    const def = (parts[defI] || '').trim();
    const ex = (exI >= 0 ? (parts[exI] || '') : '').trim();
    const cat = (catI >= 0 && parts[catI] ? parts[catI].trim() : 'Sans catégorie');

    if(!fr && !def){ result.invalid.push({ line:i+1, reason:'ligne vide', raw:lines[i] }); continue; }
    if(!fr){ result.invalid.push({ line:i+1, reason:'mot français manquant', raw:lines[i] }); continue; }
    if(!def){ result.invalid.push({ line:i+1, reason:'définition manquante', raw:lines[i] }); continue; }
    const key = fr.toLowerCase();
    if(seen.has(key)){ result.duplicates++; continue; }
    seen.add(key);
    result.words.push({ fr, ar, def, ex, cat });
  }
  result.sample = result.words.slice(0, 6);
  return result;
}

/* Compat : ancienne signature encore utilisée ailleurs */
function parseCSV(text){
  const a = analyzeCSV(text);
  return { words: a.words, duplicates: a.duplicates };
}

function toCSV(words){
  const esc = s => String(s).replace(/;/g, ',');
  let lines = ['fr;ar;def;ex;cat'];
  for(const w of words){
    lines.push([esc(w.fr), esc(w.ar), esc(w.def), esc(w.ex), esc(w.cat)].join(';'));
  }
  return lines.join('\n');
}

function commitImport(words){
  // dédoublonnage contre le lexique existant
  const existingKeys = new Set(WORDS.map(w => w.fr.toLowerCase()));
  const toAdd = [];
  let alreadyPresent = 0;
  words.forEach(w => {
    const key = w.fr.toLowerCase();
    if(existingKeys.has(key)){ alreadyPresent++; return; }
    existingKeys.add(key);
    toAdd.push(w);
  });
  const added = toAdd.length;

  // On calcule la position d'insertion : juste APRÈS les blocs déjà terminés,
  // pour que les nouveaux mots deviennent les prochains à étudier sans toucher aux blocs finis.
  activeFilterCat = null;
  rebuildBlocks(); // BLOCKS sur le lexique complet actuel
  let lastDone = -1;
  for(let i=0;i<BLOCKS.length;i++){ if(blockHasResult(i)) lastDone = i; }
  const insertAt = Math.min((lastDone + 1) * BLOCK_SIZE, WORDS.length);

  const merged = WORDS.slice();
  merged.splice(insertAt, 0, ...toAdd);
  WORDS = merged;

  saveCustomWords(WORDS);
  rebuildBlocks();
  cloudAutoPush();
  const parts = [];
  if(added > 0) parts.push(`${added} nouveau${added>1?'x':''} mot${added>1?'s':''} ajouté${added>1?'s':''}`);
  if(alreadyPresent > 0) parts.push(`${alreadyPresent} déjà présent${alreadyPresent>1?'s':''} ignoré${alreadyPresent>1?'s':''}`);
  const posInfo = (added > 0 && lastDone >= 0) ? ` · placés dès le bloc ${lastDone+2}` : '';
  const msg = parts.length ? `✓ ${parts.join(' · ')}${posInfo} — ${WORDS.length} mots au total` : 'Aucun mot importé.';
  setStatus(msg, added > 0 ? 'ok' : 'err');
  renderBlockSelect();
}

function normalizeForSearch(s){
  return String(s).toLowerCase()

function getDictMatches(){
  const q = dictQuery.trim();
  const qNorm = normalizeForSearch(q);
  return WORDS.filter(w => {
    if(dictCat && w.cat !== dictCat) return false;
    if(!q) return true;
    return normalizeForSearch(w.fr).includes(qNorm) || w.ar.includes(q) || normalizeForSearch(w.def).includes(qNorm);
  });
}

const PASS_THRESHOLD = 90; // % requis pour valider un bloc et débloquer le suivant

function blockBestPct(i){
  const perMode = blockResults[i] || {};
  let best = 0;
  GAME_MODES.forEach(m => {
    const r = perMode[m];
    if(r && r.total){ best = Math.max(best, (r.correct / r.total) * 100); }
  });
  return best;
}
function isBlockPassed(i){ return blockBestPct(i) >= PASS_THRESHOLD; }
function blockHasResult(i){
  const perMode = blockResults[i] || {};
  return GAME_MODES.some(m => perMode[m]);
}
/* Bloc débloqué : le 1er toujours ; sinon si le précédent est validé ; ou s'il a déjà un résultat (progression existante). */
function isBlockUnlocked(i){
  if(i === 0) return true;
  if(blockHasResult(i)) return true;
  return isBlockPassed(i - 1);
}

/* ============ 🎤 MODE PRONONCIATION (reconnaissance vocale) ============ */
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
const speechRecoAvailable = !!SpeechRec;
let recognition = null;
let recoActive = false;
let micContinuous = false; // une fois le micro activé dans un bloc, il se relance à chaque mot

function levenshtein(a, b){
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i)=>[i, ...Array(n).fill(0)]);
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j] = Math.min(
        dp[i-1][j]+1, dp[i][j-1]+1,
        dp[i-1][j-1] + (a[i-1]===b[j-1]?0:1)
      );
    }
  }
  return dp[m][n];
}

/* Le mot prononcé correspond-il au mot attendu ? (tolérant aux accents et petites variations) */
function speechMatches(transcript, expected){
  const clean = s => normalizeForSearch(s).replace(/[^a-z\s]/g,'').trim();
  const t = clean(transcript);
  const e = clean(expected);
  if(!t || !e) return false;
  if(t === e) return true;
  // le mot attendu apparaît dans la phrase reconnue
  const words = t.split(/\s+/);
  if(words.includes(e)) return true;
  // tolérance : distance de Levenshtein courte sur le meilleur mot
  for(const w of words){
    const dist = levenshtein(w, e);
    const tol = e.length <= 4 ? 1 : (e.length <= 7 ? 2 : 3);
    if(dist <= tol) return true;
  }
  // ou distance courte sur la phrase entière (mots composés)
  if(levenshtein(t, e) <= (e.length <= 7 ? 2 : 3)) return true;
  return false;
}

function startRecognition(word){
  if(!speechRecoAvailable || recoActive || answered) return;
  try{
    recognition = new SpeechRec();
    recognition.lang = 'fr-FR';
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;
  }catch(e){ return; }

  const micBtn = document.getElementById('micBtn');
  const micHint = document.getElementById('micHint');
  const micTr = document.getElementById('micTranscript');

  recoActive = true;
  micContinuous = true;
  micBtn.classList.add('listening');
  micHint.textContent = '🎧 J\'écoute... prononce le mot !';
  micTr.textContent = '';

  recognition.onresult = (ev) => {
    let alts = [];
    for(let i=0;i<ev.results[0].length;i++){ alts.push(ev.results[0][i].transcript); }
    const heard = alts[0] || '';
    micTr.textContent = `Tu as dit : « ${heard} »`;
    const ok = alts.some(a => speechMatches(a, word.fr));
    setTimeout(() => handleSpeakResult(ok, word, { heard }), 250);
  };
  recognition.onerror = (ev) => {
    recoActive = false;
    micBtn.classList.remove('listening');
    if(ev.error === 'not-allowed' || ev.error === 'service-not-allowed'){
      micHint.textContent = '🚫 Micro refusé — autorise le micro dans ton navigateur.';
    } else if(ev.error === 'no-speech'){
      micHint.textContent = '🤫 Rien entendu — réappuie et parle plus fort.';
    } else {
      micHint.textContent = 'Réappuie pour réessayer.';
    }
  };
  recognition.onend = () => {
    recoActive = false;
    micBtn.classList.remove('listening');
  };

  try{ recognition.start(); }
  catch(e){ recoActive = false; micBtn.classList.remove('listening'); }
}

function stopRecognition(){
  if(recognition && recoActive){ try{ recognition.stop(); }catch(e){} }
  recoActive = false;
}

function handleSpeakResult(isCorrect, word, info){
  if(answered) return;
  answered = true;
  stopRecognition();
  info = info || {};

  score.total++;
  if(!catScore[word.cat]) catScore[word.cat] = { c:0, t:0 };
  catScore[word.cat].t++;
  attemptsByFr[word.fr] = (attemptsByFr[word.fr] || 0) + 1;

  if(isCorrect){
    score.correct++; catScore[word.cat].c++;
    masteredCount++;
    queue.shift();
    sessionHistory.push({ fr: word.fr, ar: word.ar, def: word.def, cat: word.cat, attempts: attemptsByFr[word.fr] });

/* ============ 🧩 JEU DE PAIRES CHRONOMÉTRÉ ============ */
const PAIRS_PER_ROUND = 5;
const PAIRS_SECONDS = 30;
let pairsState = null;

function renderPairsRound(){
  answered = false;
  // Prend les prochains mots de la file pour ce round
  const roundWords = queue.slice(0, Math.min(PAIRS_PER_ROUND, queue.length));
  if(roundWords.length === 0){ renderEndScreen(); return; }

  // colonnes : français (gauche) et arabe (droite), mélangées indépendamment
  const left = shuffle(roundWords.map(w => ({ id:w.fr, txt:w.fr, side:'fr' })));
  const right = shuffle(roundWords.map(w => ({ id:w.fr, txt:w.ar, side:'ar' })));
  pairsState = { roundWords, matched:0, selected:null, wrongIds:new Set(), done:false };

  const totalRounds = Math.ceil(initialLength / PAIRS_PER_ROUND);
  const curRound = Math.floor((initialLength - queue.length) / PAIRS_PER_ROUND) + 1;

  const card = document.getElementById('quizCard');
  card.innerHTML = `
    <div class="cat-tag">🧩 Paires chrono · manche ${curRound}/${totalRounds}</div>
    <div class="chrono-timer-track"><div class="chrono-timer-fill" id="quizTimerFill"></div></div>
    <div class="question-line" style="text-align:center;">Associe chaque mot français à sa traduction arabe avant la fin du temps !</div>
    <div class="pairs-grid">
      <div class="pairs-col" id="pairsLeft">
        ${left.map(c => `<button class="pair-tile" data-id="${escapeHtml(c.id)}" data-side="fr">${escapeHtml(c.txt)}</button>`).join('')}
      </div>
      <div class="pairs-col" id="pairsRight">
        ${right.map(c => `<button class="pair-tile ar" data-id="${escapeHtml(c.id)}" data-side="ar">${escapeHtml(c.txt)}</button>`).join('')}
      </div>
    </div>
    <div class="reveal" id="revealWrap"></div>
  `;

  card.querySelectorAll('.pair-tile').forEach(t => {
    t.addEventListener('click', () => onPairTileClick(t));
  });
  renderProgress();
  startQuestionTimer(() => onPairsTimeout(), PAIRS_SECONDS);
}

function onPairTileClick(tile){
  if(pairsState.done) return;
  if(tile.classList.contains('matched')) return;
  const side = tile.dataset.side;
  const id = tile.dataset.id;

  const sel = pairsState.selected;
  if(!sel){
    // première sélection
    clearPairSelection();
    tile.classList.add('selected');
    pairsState.selected = { id, side, el: tile };
    return;
  }

  // clic sur la même tuile → désélectionne
  if(sel.el === tile){ tile.classList.remove('selected'); pairsState.selected = null; return; }

  // il faut une tuile de l'autre colonne
  if(sel.side === side){
    sel.el.classList.remove('selected');
    tile.classList.add('selected');
    pairsState.selected = { id, side, el: tile };
    return;
  }

  // comparaison
  if(sel.id === id){
    // bonne paire !
    sel.el.classList.remove('selected'); sel.el.classList.add('matched');
    tile.classList.add('matched');
    pairsState.selected = null;
    pairsState.matched++;
    playCorrectSound();
    // stat mot : correct si pas d'erreur préalable sur ce mot ce round
    recordWordStat(id, !pairsState.wrongIds.has(id));
    bumpCombo(true);
    if(pairsState.matched === pairsState.roundWords.length){
      finishPairsRound();
    }
  } else {
    // mauvaise paire
    const a = sel.el, b = tile;
    a.classList.remove('selected'); a.classList.add('pair-wrong'); b.classList.add('pair-wrong');
    pairsState.wrongIds.add(sel.id); pairsState.wrongIds.add(id);
    pairsState.selected = null;
    playWrongSound();
    reactMascot('ko');
    bumpCombo(false);
    setTimeout(() => { a.classList.remove('pair-wrong'); b.classList.remove('pair-wrong'); }, 500);
  }
}

function clearPairSelection(){
  document.querySelectorAll('.pair-tile.selected').forEach(t => t.classList.remove('selected'));
}

function finishPairsRound(){
  pairsState.done = true;
  clearQuestionTimer();
  celebrate();
  reactMascot('ok');

  // comptabilise le round dans le score global
  pairsState.roundWords.forEach(w => {
    score.total++;
    if(!catScore[w.cat]) catScore[w.cat] = { c:0, t:0 };
    catScore[w.cat].t++;
    const clean = !pairsState.wrongIds.has(w.fr);
    if(clean){ score.correct++; catScore[w.cat].c++; }
    sessionHistory.push({ fr:w.fr, ar:w.ar, def:w.def, cat:w.cat, attempts: clean ? 1 : 2 });
  });
  // retire ces mots de la file
  queue.splice(0, pairsState.roundWords.length);
  masteredCount = initialLength - queue.length;
  renderScoreboard();

  setTimeout(() => {
    if(queue.length === 0){ renderEndScreen(); }
    else { renderPairsRound(); }
  }, 700);
}

function onPairsTimeout(){
  if(pairsState.done) return;
  pairsState.done = true;
  playWrongSound();
  reactMascot('ko');
  // les paires non trouvées comptent comme erreurs
  pairsState.roundWords.forEach(w => {
    score.total++;
    if(!catScore[w.cat]) catScore[w.cat] = { c:0, t:0 };
    catScore[w.cat].t++;
    const matched = document.querySelector(`.pair-tile.matched[data-id="${CSS.escape(w.fr)}"][data-side="fr"]`);
    const clean = matched && !pairsState.wrongIds.has(w.fr);
    if(clean){ score.correct++; catScore[w.cat].c++; recordWordStat(w.fr, true); }
    else { recordWordStat(w.fr, false); }
    sessionHistory.push({ fr:w.fr, ar:w.ar, def:w.def, cat:w.cat, attempts: clean ? 1 : 2 });
  });
  queue.splice(0, pairsState.roundWords.length);
  masteredCount = initialLength - queue.length;
  renderScoreboard();

  const revealWrap = document.getElementById('revealWrap');
  revealWrap.classList.add('show');
  revealWrap.innerHTML = `<div class="big-feedback ko">⏱️ Temps écoulé pour cette manche !</div>
    <button class="next-btn" id="nextBtn">Continuer →</button>`;
  document.getElementById('nextBtn').addEventListener('click', () => {
    if(queue.length === 0){ renderEndScreen(); } else { renderPairsRound(); }
  });
  focusReveal(revealWrap);
}

/* Similarité entre la phrase dite et la phrase cible : fraction de mots retrouvés. */
function sentenceSimilarity(said, target){
  const norm = s => normalizeForSearch(s).replace(/[^a-z\s]/g,' ').split(/\s+/).filter(Boolean);
  const a = norm(said), b = norm(target);
  if(!b.length) return 0;
  const bset = [...b];
  let hit = 0;
  a.forEach(w => {
    const idx = bset.indexOf(w);
    if(idx >= 0){ hit++; bset.splice(idx,1); }
    else {
      // tolérance orthographique
      const near = bset.findIndex(x => levenshtein(x, w) <= (x.length <= 4 ? 1 : 2));
      if(near >= 0){ hit++; bset.splice(near,1); }
    }
  });
  return hit / b.length;
}

function startRepeatRecognition(sentence){
  if(!speechRecoAvailable || recoActive || answered) return;
  try{
    recognition = new SpeechRec();
    recognition.lang = 'fr-FR';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
  }catch(e){ return; }

  const micBtn = document.getElementById('micBtn');
  const micHint = document.getElementById('micHint');
  const micTr = document.getElementById('micTranscript');
  recoActive = true;
  micBtn.classList.add('listening');
  micHint.textContent = '🎧 J\'écoute... répète la phrase !';
  micTr.textContent = '';

  recognition.onresult = (ev) => {
    const heard = ev.results[0][0].transcript || '';
    micTr.textContent = `Tu as dit : « ${heard} »`;
    const sim = sentenceSimilarity(heard, sentence);
    setTimeout(() => handleRepeatResult(sim, { heard }), 250);
  };
  recognition.onerror = (ev) => {
    recoActive = false; micBtn.classList.remove('listening');
    if(ev.error === 'not-allowed' || ev.error === 'service-not-allowed'){ micHint.textContent = '🚫 Micro refusé — autorise le micro.'; }
    else if(ev.error === 'no-speech'){ micHint.textContent = '🤫 Rien entendu — réappuie et parle.'; }
    else { micHint.textContent = 'Réappuie pour réessayer.'; }
  };
  recognition.onend = () => { recoActive = false; micBtn.classList.remove('listening'); };
  try{ recognition.start(); }catch(e){ recoActive = false; micBtn.classList.remove('listening'); }
}

function handleRepeatResult(similarity, info){
  if(answered) return;
  answered = true;
  stopRecognition();
  info = info || {};
  const word = window.__currentWord;
  const sentence = window.__repeatSentence;
  const pctSaid = Math.round(similarity * 100);
  const isCorrect = similarity >= 0.7; // au moins 70% de la phrase correctement répétée

  score.total++;
  if(!catScore[word.cat]) catScore[word.cat] = { c:0, t:0 };
  catScore[word.cat].t++;
  attemptsByFr[word.fr] = (attemptsByFr[word.fr] || 0) + 1;

  if(isCorrect){
    score.correct++; catScore[word.cat].c++;
    masteredCount++;
    queue.shift();
    sessionHistory.push({ fr: word.fr, ar: word.ar, def: word.def, cat: word.cat, attempts: attemptsByFr[word.fr] });
  } else {
    const w = queue.shift(); queue.push(w);
  }
  recordWordStat(word.fr, isCorrect);
  bumpCombo(isCorrect);

  const micBtn = document.getElementById('micBtn');
  if(micBtn){ micBtn.classList.add('disabled'); }

  if(isCorrect){ celebrate(); reactMascot('ok'); playCorrectSound(); }
  else {
    const cardEl = document.getElementById('quizCard');
    cardEl.classList.remove('shake'); void cardEl.offsetWidth; cardEl.classList.add('shake');
    reactMascot('ko'); playWrongSound();
  }
  renderScoreboard();

  const headline = info.skipped ? '⏭ Phrase passée :'
    : (info.revealed ? '👁 Voici la phrase :'
      : (isCorrect ? `🎉 Bravo ! Tu as répété ${pctSaid}% de la phrase` : `💛 ${pctSaid}% — réécoute et réessaie. Voici la phrase :`));

  const revealWrap = document.getElementById('revealWrap');
  // révèle la phrase (surtout si elle était cachée)
  const rs = document.getElementById('repeatSentence');
  if(rs){ rs.classList.remove('hidden'); rs.textContent = sentence; }

  revealWrap.classList.add('show');
  revealWrap.innerHTML = `
    <div class="big-feedback ${isCorrect ? 'ok' : 'ko'}">${headline}</div>
    <div class="def-text" style="text-align:center;font-size:18px;margin:8px 0;">« ${escapeHtml(sentence)} »

    </div>

const MODE_LABELS = { classic: '🎯 Classique', blank: '🕳️ Phrase à trous', chrono: '⚡ Chrono Vrai/Faux', speak: '🎤 Prononciation', pairs: '🧩 Paires chrono', dialogue: '💬 Dialogue', repeat: '🗣️ Répétition' };

function renderRecapView(blockIndex, result, justFinished){
  clearQuestionTimer();
  document.body.classList.remove('quiz-active');
  const pct = result.total ? Math.round((result.correct/result.total)*100) : 0;
  const errors = result.total - result.correct;
  const history = result.history || [];
  const errorCount = history.filter(w => w.attempts > 1).length;
  const modeLabel = MODE_LABELS[result.mode || gameMode] || '';
  const passed = pct >= PASS_THRESHOLD;
  const flawless = result.total > 0 && result.correct === result.total;
  const combo = result.bestCombo || 0;
  const nextUnlocked = blockIndex + 1 < BLOCKS.length;
  const flawlessBanner = flawless
    ? `<div class="pass-banner flawless">🏆 Bloc terminé <b>SANS FAUTE</b> ! Parfait du premier coup 🎉</div>`
    : '';
  const comboLine = (justFinished && combo >= 3)
    ? `<div class="combo-line">🔥 Meilleure série : <b>${combo}</b> bonnes réponses d'affilée</div>`
    : '';
  const passBanner = `
    ${flawlessBanner}
    <div class="pass-banner ${passed ? 'ok' : 'todo'}">
      ${passed
        ? `✅ Bloc validé à ${pct}% !${nextUnlocked ? ' Bloc ' + (blockIndex+2) + ' débloqué 🔓' : ''}`
        : `🎯 ${pct}% — il te faut au moins ${PASS_THRESHOLD}% pour valider ce bloc${nextUnlocked ? ' et débloquer le suivant' : ''}. Réessaie !`}
    </div>
    ${comboLine}`;

  // récap de tous les modes déjà faits sur ce bloc
  const perMode = blockResults[blockIndex] || {};
  const modeRows = GAME_MODES.filter(m => perMode[m]).map(m => {
    const r = perMode[m];
    const p = r.total ? Math.round((r.correct/r.total)*100) : 0;
    const cls = p >= PASS_THRESHOLD ? 'ok' : 'todo';
    return `<div class="pm-row"><span>${MODE_LABELS[m]}</span><span class="pm-score ${cls}">${r.correct}/${r.total} · ${p}%</span></div>`;
  }).join('');
  const modeSummary = modeRows ? `<div class="pm-summary"><div class="pm-title">📊 Tes notes sur ce bloc</div>${modeRows}</div>` : '';

  const card = document.getElementById('quizCard');
  card.innerHTML = `
    <div class="end-screen">
      <div class="cat-tag">${justFinished ? 'Bloc ' + (blockIndex+1) + ' terminé' : 'Récapitulatif — Bloc ' + (blockIndex+1)} · ${modeLabel} — ${history.length || result.total} mots</div>
      <div class="big">${result.correct} / ${result.total}</div>
      <div class="sub" style="color:#6B6552;">${pct}% de bonnes réponses au total${errorCount > 0 ? ` · ${errorCount} mot${errorCount>1?'s':''} eu${errorCount>1?'rent':''} au moins une erreur` : ' · sans erreur, bravo !'}</div>
      ${(result.durationSec || result.xp) ? `<div class="recap-meta">
        ${result.durationSec ? `<span class="recap-meta-pill">⏱️ ${fmtDuration(result.durationSec)}</span>` : ''}
        ${result.xp ? `<span class="recap-meta-pill xp">⭐ +${result.xp} points${result.xpMult > 1 ? ` <b>×${result.xpMult}</b>` : ''}</span>` : ''}
      </div>` : ''}
      ${passBanner}
      ${modeSummary}
      <div style="font-family:'Baloo 2',sans-serif;font-weight:800;color:var(--purple);margin:20px 0 8px;font-size:15px;">🔁 Refaire ce bloc dans le mode :</div>
      <div class="replay-modes" id="replayModes"></div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap;">
        <button class="restart-btn" id="blocksBtn" style="background:var(--purple);color:#fff;box-shadow:0 4px 0 var(--purple-dark);">← Choisir un autre bloc</button>
      </div>
      ${history.length ? buildRecapTableHtml(history) : '<div class="sub" style="margin-top:20px;color:#8A8266;">Détail mot par mot indisponible pour cette session (ancienne version).</div>'}
    </div>
  `;
  document.getElementById('footerNote').textContent = justFinished ? 'Terminé' : '';
  document.getElementById('progressFill').style.width = '100%';

  // Boutons de choix de mode pour rejouer
  const replayWrap = document.getElementById('replayModes');
  GAME_MODES.forEach(mid => {
    const r = perMode[mid];
    const p = r && r.total ? Math.round((r.correct/r.total)*100) : null;
    const btn = document.createElement('button');
    btn.className = 'replay-mode-btn' + (mid === (result.mode || gameMode) ? ' current' : '');
    btn.innerHTML = `${MODE_LABELS[mid]}${p !== null ? ` <span class="rp-score">${p}%</span>` : ' <span class="rp-new">nouveau</span>'}`;
    btn.addEventListener('click', () => { gameMode = mid; buildDeck(blockIndex); renderScoreboard(); renderCard(); });
    replayWrap.appendChild(btn);
  });

  document.getElementById('blocksBtn').addEventListener('click', renderBlockSelect);
  attachRecapSpeakHandlers();
}

function renderEndScreen(){
  const durationSec = blockStartTime ? Math.max(1, Math.round((Date.now() - blockStartTime)/1000)) : 0;
  const pctVal = score.total ? Math.round((score.correct/score.total)*100) : 0;
  const passed90 = pctVal >= PASS_THRESHOLD;
  const flawless = score.total > 0 && score.correct === score.total;
  // Points : 10 par bonne réponse + bonus combo + bonus vitesse/sans-faute
  const baseXp = (score.correct * 10) + (bestCombo >= 5 ? 15 : 0) + (flawless ? 25 : 0) + (passed90 ? 15 : 0);
  const mult = xpMultiplier();
  const xpEarned = baseXp * mult;

  const result = { correct: score.correct, total: score.total, history: sessionHistory.slice(), mode: gameMode, finishedAt: Date.now(), bestCombo: bestCombo, durationSec: durationSec, xp: xpEarned, xpMult: mult };
  saveBlockResult(currentBlock, gameMode, result);
  const goalJustMet = recordDailyActivity();
  const questsBefore = questsAllDone();
  recordDailyStats(durationSec, passed90, xpEarned);
  const questsJustDone = !questsBefore && questsAllDone();

  renderRecapView(currentBlock, result, true);
  cloudAutoPush();
  // grande fête de fin de bloc 🎉
  const pct = result.total ? (result.correct / result.total) : 0;
  let bursts = pct === 1 ? 6 : (pct >= 0.8 ? 3 : 2);
  for(let i=0;i<bursts;i++){ setTimeout(launchConfetti, i*230); }
  setTimeout(() => burstStars(window.innerWidth/2, window.innerHeight*0.35), 150);
  if(pct === 1){ setTimeout(() => burstStars(window.innerWidth*0.3, window.innerHeight*0.4), 400); setTimeout(() => burstStars(window.innerWidth*0.7, window.innerHeight*0.4), 550); }
  if(goalJustMet){ setTimeout(showGoalToast, 650); }
  if(questsJustDone){ setTimeout(() => showGoalToast('🎉 Tous les défis du jour terminés !', 'Bravo, reviens demain pour de nouveaux défis !'), goalJustMet ? 4200 : 650); }
}

function showGoalToast(customTitle, customSub, customIcon){
  const streak = computeStreak();
  const title = customTitle || 'Objectif du jour atteint !';
  const sub = customSub || `Série de ${streak} jour${streak>1?'s':''} · reviens demain pour continuer !`;
  const icon = customIcon || '🔥';
  const toast = document.createElement('div');
  toast.className = 'goal-toast';
  toast.innerHTML = `<div class="goal-toast-fire">${icon}</div>
    <div><div class="goal-toast-title">${title}</div>
    <div class="goal-toast-sub">${sub}</div></div>`;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3800);
}
