<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexique — QCM interactif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&family=Changa:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --purple:#7C3AED;
    --purple-dark:#5B21B6;
    --pink:#FF5DA2;
    --orange:#FF8A3D;
    --yellow:#FFD23F;
    --green:#22C55E;
    --green-dark:#16A34A;
    --red:#FF5A5F;
    --red-dark:#E0393E;
    --blue:#3DD6F5;
    --ink:#2B1E4A;
    --card:#FFFFFF;
    --text:#3A2E5C;
    --text-dim:#8377A8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;color:#fff;font-family:'Nunito',sans-serif;
    padding:32px 16px 90px;
    background:
      radial-gradient(700px 500px at 8% 8%, rgba(255,140,60,0.55), transparent 60%),
      radial-gradient(800px 600px at 95% 15%, rgba(61,214,245,0.45), transparent 55%),
      radial-gradient(700px 550px at 50% 105%, rgba(255,93,162,0.5), transparent 60%),
      linear-gradient(160deg, #6D28D9 0%, #7C3AED 45%, #A855F7 100%);
    overflow-x:hidden;
  }
  .wrap{max-width:820px;margin:0 auto;position:relative;}

  header{text-align:center;margin-bottom:22px;}
  .eyebrow{
    display:inline-block;font-family:'Baloo 2',sans-serif;font-weight:700;letter-spacing:.04em;font-size:13px;
    color:var(--purple-dark);background:var(--yellow);padding:6px 16px;border-radius:999px;
    box-shadow:0 3px 0 #D9A400;margin-bottom:14px;transform:rotate(-2deg);
  }
  h1{
    font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(30px,6vw,48px);margin:0 0 8px;
    color:#fff;text-shadow:0 4px 0 rgba(0,0,0,0.15), 0 0 30px rgba(255,255,255,0.25);
    letter-spacing:.01em;
  }
  .sub{color:rgba(255,255,255,0.85);font-size:15px;max-width:520px;margin:0 auto;font-weight:600;}

  .csv-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:22px 0 6px;}
  .csv-btn{
    background:rgba(255,255,255,0.16);border:2px solid rgba(255,255,255,0.35);color:#fff;
    padding:9px 16px;border-radius:999px;font-size:12.5px;font-weight:800;cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:all .15s ease;font-family:'Nunito',sans-serif;
  }
  .csv-btn:hover{background:rgba(255,255,255,0.3);transform:translateY(-2px);}
  .csv-status{text-align:center;font-size:13px;color:#fff;margin-top:10px;min-height:16px;font-weight:700;}
  .csv-status.ok{color:#C6FFDD;}
  .csv-status.err{color:#FFD0D3;}

  .scoreboard{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:20px 0 8px;}
  .chip{
    background:#fff;border:none;border-radius:999px;padding:9px 18px;font-size:13.5px;
    display:flex;align-items:center;gap:8px;font-weight:800;color:var(--text);
    box-shadow:0 3px 0 rgba(0,0,0,0.15);
  }
  .chip b{color:var(--purple);font-family:'Baloo 2',sans-serif;font-weight:800;}
  .chip.total{background:var(--yellow);color:#5A3E00;box-shadow:0 3px 0 #C99000;}

  .progress-track{
    height:16px;border-radius:999px;background:rgba(255,255,255,0.25);margin:20px 0 34px;overflow:hidden;
    box-shadow:inset 0 2px 5px rgba(0,0,0,0.2);border:2px solid rgba(255,255,255,0.4);
  }
  .progress-fill{
    height:100%;border-radius:999px;width:0%;transition:width .5s cubic-bezier(.34,1.56,.64,1);
    background:repeating-linear-gradient(45deg, var(--green), var(--green) 10px, var(--green-dark) 10px, var(--green-dark) 20px);
    box-shadow:0 0 14px rgba(34,197,94,0.7);
  }

  .card{
    background:var(--card);color:var(--text);border-radius:28px;padding:38px 32px;position:relative;
    box-shadow:0 14px 0 rgba(0,0,0,0.18), 0 24px 50px -20px rgba(0,0,0,0.5);
    border:4px solid #fff;
  }
  .cat-tag{
    display:inline-block;font-family:'Baloo 2',sans-serif;font-size:12.5px;font-weight:700;
    color:#fff;background:linear-gradient(135deg,var(--pink),var(--orange));padding:6px 16px;border-radius:999px;margin-bottom:20px;
    box-shadow:0 3px 0 rgba(0,0,0,0.15);
  }
  .word-fr{
    font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(28px,6.5vw,46px);line-height:1.05;margin:4px 0 10px;
    color:var(--ink);display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .speak-btn{
    flex:none;width:44px;height:44px;border-radius:50%;border:none;background:var(--blue);
    display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s ease;
    box-shadow:0 4px 0 #1E9CB8;
  }
  .speak-btn:hover{transform:translateY(-2px);}
  .speak-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #1E9CB8;}
  .speak-btn svg{width:20px;height:20px;stroke:#fff;}
  .speak-btn.small{width:32px;height:32px;box-shadow:0 3px 0 #1E9CB8;}
  .speak-btn.small svg{width:14px;height:14px;}
  .ex-row{display:flex;align-items:center;gap:10px;}
  .question-line{color:var(--text-dim);font-size:15px;margin:6px 0 26px;font-weight:700;}

  .options{display:grid;gap:13px;}
  .opt{
    text-align:left;border:none;background:#F4F1FF;border-radius:16px;padding:16px 20px;
    font-size:15px;font-weight:700;line-height:1.4;cursor:pointer;transition:all .12s ease;color:var(--text);
    font-family:'Nunito',sans-serif;box-shadow:0 4px 0 #D9D2F7;
  }
  .opt:hover:not(.disabled){background:#EAE3FF;transform:translateY(-2px);box-shadow:0 6px 0 #D9D2F7;}
  .opt:active:not(.disabled){transform:translateY(2px);box-shadow:0 2px 0 #D9D2F7;}
  .opt.correct{
    background:var(--green);color:#fff;font-weight:800;box-shadow:0 4px 0 var(--green-dark);
    animation:pop .35s ease;
  }
  .opt.wrong{
    background:var(--red);color:#fff;font-weight:800;box-shadow:0 4px 0 var(--red-dark);
  }
  .opt.disabled{cursor:default;}
  .opt.faded{opacity:.35;box-shadow:none;}
  @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.05);}100%{transform:scale(1);}}
  @keyframes shakeCard{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-10px) rotate(-1deg);}
    40%{transform:translateX(9px) rotate(1deg);}
    60%{transform:translateX(-6px);}
    80%{transform:translateX(4px);}
  }
  .card.shake{animation:shakeCard .45s ease;}

  .reveal{margin-top:26px;padding-top:24px;border-top:3px dashed #E4DEFC;display:none;}
  .reveal.show{display:block;animation:fadeUp .4s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .seal{display:flex;align-items:center;gap:18px;margin-bottom:16px;}
  .seal-badge{
    width:66px;height:66px;border-radius:50%;flex:none;
    background:linear-gradient(135deg,var(--yellow),var(--orange));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 5px 0 #D9A400;animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes bounceIn{0%{transform:scale(0.3);}60%{transform:scale(1.15);}100%{transform:scale(1);}}
  .seal-badge svg{width:28px;height:28px;stroke:#5A3E00;}
  .arabic-word{font-family:'Changa',sans-serif;font-size:30px;direction:rtl;color:var(--purple);font-weight:700;}
  .def-text{font-size:16px;color:var(--text);margin:6px 0 12px;font-weight:700;}
  .ex-text{font-size:15px;color:var(--text-dim);font-weight:600;}
  .ex-text .tilde{color:var(--pink);font-weight:800;}

  .feedback-msg{font-size:14px;font-weight:900;margin-bottom:4px;font-family:'Baloo 2',sans-serif;letter-spacing:.02em;}
  .feedback-msg.ok{color:var(--green-dark);}
  .feedback-msg.ko{color:var(--red-dark);}

  .next-btn{
    margin-top:24px;width:100%;padding:16px;border:none;border-radius:16px;
    background:linear-gradient(135deg,var(--pink),var(--purple));
    color:#fff;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:16px;cursor:pointer;
    box-shadow:0 5px 0 #B02E75;transition:all .12s ease;
  }
  .next-btn:hover{transform:translateY(-2px);}
  .next-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #B02E75;}

  .footer-note{text-align:center;color:rgba(255,255,255,0.85);font-size:13px;margin-top:26px;font-weight:700;}

  .end-screen{text-align:center;padding:40px 20px;}
  .end-screen .big{
    font-family:'Baloo 2',sans-serif;font-weight:800;font-size:52px;margin:0 0 8px;color:var(--purple);
    animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  .restart-btn{
    margin-top:20px;padding:13px 28px;border:none;border-radius:999px;
    background:var(--yellow);color:#5A3E00;font-weight:800;cursor:pointer;font-size:14.5px;
    font-family:'Baloo 2',sans-serif;box-shadow:0 4px 0 #C99000;transition:all .12s ease;
  }
  .restart-btn:hover{transform:translateY(-2px);}
  .restart-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #C99000;}

  .filter-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:18px 0 24px;}
  .filter-chip{
    border:none;background:#F4F1FF;color:var(--purple-dark);padding:7px 16px;border-radius:999px;
    font-size:12.5px;font-weight:800;cursor:pointer;transition:all .15s ease;font-family:'Nunito',sans-serif;
    box-shadow:0 3px 0 #D9D2F7;
  }
  .filter-chip.active{background:var(--purple);color:#fff;box-shadow:0 3px 0 var(--purple-dark);}

  .recap-wrap{margin-top:26px;text-align:left;}
  .recap-table{width:100%;border-collapse:separate;border-spacing:0 6px;font-size:13.5px;font-family:'Nunito',sans-serif;}
  .recap-table th{
    text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);
    padding:4px 11px;font-weight:800;
  }
  .recap-table td{padding:10px 11px;background:#F7F5FF;vertical-align:middle;color:var(--text);font-weight:700;}
  .recap-table tr td:first-child{border-radius:12px 0 0 12px;}
  .recap-table tr td:last-child{border-radius:0 12px 12px 0;}
  .recap-table .rc-ar{font-family:'Changa',sans-serif;font-size:17px;direction:rtl;color:var(--purple);}
  .recap-table .rc-status{white-space:nowrap;font-weight:800;font-family:'Baloo 2',sans-serif;font-size:12.5px;}
  .recap-table .rc-status.first{color:var(--green-dark);}
  .recap-table .rc-status.retry{color:#C97A00;}
  .recap-table .rc-speak{
    width:26px;height:26px;border-radius:50%;border:none;background:var(--blue);
    display:inline-flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 0 #1E9CB8;
  }
  .recap-table .rc-speak svg{width:11px;height:11px;stroke:#fff;}
  .recap-scroll{max-height:420px;overflow-y:auto;padding-right:4px;}

  .search-box-wrap{position:relative;margin-bottom:22px;}
  .search-input{
    width:100%;padding:15px 48px 15px 20px;border-radius:16px;border:none;
    background:#F4F1FF;color:var(--text);font-size:15.5px;font-weight:700;font-family:'Nunito',sans-serif;
  }
  .search-input:focus{outline:3px solid var(--purple);}
  .search-input::placeholder{color:var(--text-dim);font-weight:600;}
  .search-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}
  .search-count{font-size:13px;color:var(--text-dim);margin:-12px 0 18px;font-weight:700;}
  .search-results{display:flex;flex-direction:column;gap:12px;max-height:520px;overflow-y:auto;padding-right:4px;}
  .result-card{border:none;background:#F7F5FF;border-radius:18px;padding:18px 20px;}
  .result-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px;}
  .result-fr{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:20px;color:var(--ink);display:flex;align-items:center;gap:10px;}
  .result-cat{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;font-weight:800;color:#fff;background:var(--purple);padding:4px 12px;border-radius:999px;}
  .result-ar{font-family:'Changa',sans-serif;font-size:19px;direction:rtl;color:var(--purple);font-weight:700;margin:4px 0;}
  .result-def{font-size:14.5px;color:var(--text);font-weight:700;margin:4px 0;}
  .result-ex{font-size:14px;color:var(--text-dim);font-weight:600;}
  .no-results{text-align:center;color:var(--text-dim);font-weight:700;padding:30px 10px;}

  .mode-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:4px 0 22px;}
  .mode-chip{
    border:none;background:#F4F1FF;color:var(--purple-dark);padding:10px 18px;border-radius:999px;
    font-weight:800;font-family:'Baloo 2',sans-serif;font-size:13px;cursor:pointer;
    box-shadow:0 3px 0 #D9D2F7;transition:all .15s ease;
  }
  .mode-chip.active{background:var(--purple);color:#fff;box-shadow:0 3px 0 var(--purple-dark);}

  .blank-slot{display:inline-block;min-width:78px;height:1.05em;border-bottom:5px solid var(--pink);vertical-align:middle;margin:0 4px;}

  .chrono-timer-track{height:12px;border-radius:999px;background:#F0ECFF;overflow:hidden;margin:6px 0 26px;}
  .chrono-timer-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));width:100%;}
  .chrono-statement{
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:clamp(19px,4.4vw,27px);line-height:1.45;
    color:var(--ink);margin:10px 0 30px;text-align:center;
  }
  .chrono-btns{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .chrono-btn{border:none;border-radius:20px;padding:24px;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:20px;cursor:pointer;transition:all .12s ease;}
  .chrono-btn.true{background:var(--green);color:#fff;box-shadow:0 5px 0 var(--green-dark);}
  .chrono-btn.false{background:var(--red);color:#fff;box-shadow:0 5px 0 var(--red-dark);}
  .chrono-btn:hover:not(.disabled){transform:translateY(-2px);}
  .chrono-btn:active:not(.disabled){transform:translateY(3px);}
  .chrono-btn.disabled{opacity:.55;cursor:default;}

  .dict-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:0 0 14px;}
  .view-toggle{display:flex;gap:0;border-radius:999px;overflow:hidden;box-shadow:0 3px 0 #D9D2F7;}
  .view-toggle-btn{
    border:none;background:#F4F1FF;color:var(--purple-dark);padding:8px 16px;font-weight:800;
    font-family:'Nunito',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s ease;
  }
  .view-toggle-btn.active{background:var(--purple);color:#fff;}

  .dict-list{display:flex;flex-direction:column;gap:6px;}
  .dict-row{
    display:grid;grid-template-columns:32px 1fr auto auto;gap:10px;align-items:center;
    background:#F7F5FF;border-radius:12px;padding:8px 12px;
  }
  .dict-row-fr{font-weight:800;color:var(--ink);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dict-row-ar{font-family:'Changa',sans-serif;direction:rtl;color:var(--purple);font-weight:700;font-size:15px;white-space:nowrap;}
  .dict-row-badge{font-size:11px;white-space:nowrap;}

  .hist-list{display:flex;flex-direction:column;gap:10px;margin-top:18px;text-align:left;}
  .hist-row{
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    background:#F7F5FF;border-radius:16px;padding:14px 18px;
  }
  .hist-title{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:17px;color:var(--ink);}
  .hist-score{margin-left:8px;font-size:15px;}
  .hist-score.gold{color:#C99000;}
  .hist-score.good{color:var(--green-dark);}
  .hist-score.warn{color:var(--red-dark);}
  .hist-sub{font-size:12.5px;color:var(--text-dim);font-weight:700;margin-top:2px;}
  .hist-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .hist-btn{
    border:none;background:#fff;color:var(--purple-dark);padding:8px 13px;border-radius:999px;
    font-weight:800;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;
    box-shadow:0 3px 0 #D9D2F7;transition:all .12s ease;
  }
  .hist-btn:hover{transform:translateY(-1px);}
  .hist-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #D9D2F7;}
  .hist-btn.danger{color:var(--red-dark);}

  .stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0 10px;}
  .stat-box{background:#F4F1FF;border-radius:16px;padding:12px 8px;text-align:center;box-shadow:0 3px 0 #D9D2F7;}
  .stat-box.gold{background:#FFF6D6;box-shadow:0 3px 0 #EBD289;}
  .stat-box.warn{background:#FFE9E4;box-shadow:0 3px 0 #F3C4BA;}
  .stat-num{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:22px;color:var(--ink);line-height:1.1;}
  .stat-lbl{font-size:11px;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}

  @media (max-width:640px){
    body{padding:18px 10px 60px;}
    .card{padding:24px 16px;border-radius:22px;}
    .csv-btn{padding:8px 12px;font-size:11.5px;}
    .mode-chip{padding:8px 13px;font-size:12px;}
    .filter-chip{padding:6px 12px;font-size:11px;}
    .chip{padding:7px 13px;font-size:12px;}
    #blockGrid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr)) !important;}
    .chrono-statement{font-size:clamp(17px,5vw,22px);}
    .chrono-btn{padding:18px;font-size:17px;}
    .stats-strip{grid-template-columns:repeat(2,1fr);}
    .search-input{font-size:16px;} /* évite le zoom auto iOS */
    .dict-row{grid-template-columns:28px 1fr auto;}
    .dict-row-badge{display:none;}
    .hist-row{flex-direction:column;align-items:flex-start;}
  }

  .confetti-piece{
    position:fixed;top:-20px;width:9px;height:9px;pointer-events:none;z-index:9999;border-radius:2px;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(105vh) translateX(var(--drift,0px)) rotate(720deg);opacity:0.4;}
  }

  @media (max-width:480px){ .card{padding:28px 20px;} .seal{flex-direction:column;align-items:flex-start;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Lexique évolutif · Français ↔ Arabe</div>
    <h1 id="mainTitle">QCM des mots</h1>
    <div class="sub" id="subLine">Choisis la bonne définition. Bonne réponse → tu débloques la traduction arabe et un exemple.</div>
  </header>

  <div class="csv-bar">
    <button class="csv-btn" id="dictBtn">📖 Mots & Recherche</button>
    <button class="csv-btn" id="historyBtn">🏆 Historique</button>
    <button class="csv-btn" id="syncBtn">☁️ Synchro</button>
    <button class="csv-btn" id="importBtn">⇪ Importer un CSV</button>
    <button class="csv-btn" id="exportBtn">⇩ Exporter le CSV</button>
    <button class="csv-btn" id="resetBtn">↺ Lexique par défaut</button>
    <input type="file" id="csvFileInput" accept=".csv,text/csv" style="display:none;">
  </div>
  <div class="csv-status" id="csvStatus"></div>

  <div class="scoreboard" id="scoreboard"></div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  <div class="card" id="quizCard"></div>

  <div class="footer-note" id="footerNote"></div>

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function hashWords(words){
  let str = words.map(w => w.fr).join('|');
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) | 0; }
  return 'h' + (h >>> 0).toString(36) + '_' + words.length;
}

let audioCtx = null;
function getAudioCtx(){
  try{
    if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
    return audioCtx;
  }catch(e){ return null; }
}

function playChime(notes, opts){
  const ctx = getAudioCtx();
  if(!ctx) return;
  opts = opts || {};
  const noteDur = opts.noteDur || 0.14;
  const gap = opts.gap || noteDur;
  const volume = opts.volume || 0.2;
  let t = ctx.currentTime;
  notes.forEach(freq => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = opts.type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(volume, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + noteDur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + noteDur + 0.03);
    t += gap;
  });
}

/* ---------- CSV parsing / export ---------- */
function parseCSV(text){
  const lines = text.replace(/\r/g,'').split('\n').filter(l => l.trim().length > 0);
  if(lines.length < 2) return { words: [], duplicates: 0 };
  const header = lines[0].split(';').map(h => h.trim().toLowerCase());
  const frI = header.indexOf('fr') >= 0 ? header.indexOf('fr') : header.indexOf('français');
  const arI = header.indexOf('ar') >= 0 ? header.indexOf('ar') : header.indexOf('arabe');
  const defI = header.indexOf('def') >= 0 ? header.indexOf('def') : header.indexOf('définition');
  const exI = header.indexOf('ex') >= 0 ? header.indexOf('ex') : header.indexOf('exemple');
  const catI = header.indexOf('cat') >= 0 ? header.indexOf('cat') : header.indexOf('catégorie');

  const out = [];
  const seen = new Set();
  let duplicates = 0;
  for(let i=1;i<lines.length;i++){
    const parts = lines[i].split(';');
    if(parts.length < 4) continue;
    const fr = (parts[frI] || '').trim();
    const ar = (parts[arI] || '').trim();
    const def = (parts[defI] || '').trim();
    const ex = (parts[exI] || '').trim();
    const cat = (catI >= 0 && parts[catI] ? parts[catI].trim() : 'Sans catégorie');
    if(!fr || !def) continue;
    const key = fr.toLowerCase();
    if(seen.has(key)){ duplicates++; continue; }
    seen.add(key);
    out.push({ fr, ar, def, ex, cat });
  }
  return { words: out, duplicates };
}

function toCSV(words){
  const esc = s => String(s).replace(/;/g, ',');
  let lines = ['fr;ar;def;ex;cat'];
  for(const w of words){
    lines.push([esc(w.fr), esc(w.ar), esc(w.def), esc(w.ex), esc(w.cat)].join(';'));
  }
  return lines.join('\n');
}

document.getElementById('csvFileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const { words: parsed, duplicates } = parseCSV(reader.result);
      if(parsed.length === 0){
        setStatus('Aucun mot valide trouvé dans ce fichier. Format attendu : fr;ar;def;ex;cat', 'err');
        return;
      }
      const existingKeys = new Set(WORDS.map(w => w.fr.toLowerCase()));
      const merged = WORDS.slice();
      let added = 0, alreadyPresent = 0;
      parsed.forEach(w => {
        const key = w.fr.toLowerCase();
        if(existingKeys.has(key)){ alreadyPresent++; return; }
        existingKeys.add(key);
        merged.push(w);
        added++;
      });
      WORDS = merged;
      activeFilterCat = null;
      saveCustomWords(WORDS);
      rebuildBlocks();
      const parts = [];
      if(added > 0) parts.push(`${added} nouveau${added>1?'x':''} mot${added>1?'s':''} ajouté${added>1?'s':''}`);
      if(alreadyPresent > 0) parts.push(`${alreadyPresent} déjà présent${alreadyPresent>1?'s':''} ignoré${alreadyPresent>1?'s':''}`);
      if(duplicates > 0) parts.push(`${duplicates} doublon${duplicates>1?'s':''} dans le fichier ignoré${duplicates>1?'s':''}`);
      const msg = parts.length ? `✓ ${parts.join(' · ')} — ${WORDS.length} mots au total` : 'Aucun mot importé.';
      setStatus(msg, added > 0 ? 'ok' : 'err');
      renderBlockSelect();
    } catch(err){
      setStatus('Erreur de lecture du fichier CSV.', 'err');
    }
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
});

document.getElementById('exportBtn').addEventListener('click', () => {

  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setStatus(`⇩ ${WORDS.length} mots exportés — ajoute des lignes puis réimporte le fichier.`, 'ok');
});

}

    html += `<div class="chip">🔥 Série <b>${chronoStreak}</b></div>`;

    const s = catScore[c];
    html += `<div class="chip">${escapeHtml(c)} <b>${s.c}/${s.t}</b></div>`;

function buildWordRowHtml(w){
  return `
    <div class="dict-row">
      <button class="speak-btn small" data-speak-fr="${escapeHtml(w.fr)}" title="Écouter">${SPEAK_SVG_SMALL}</button>
      <div class="dict-row-fr" title="${escapeHtml(w.def)}">${escapeHtml(w.fr)}</div>
      <div class="dict-row-ar">${escapeHtml(w.ar)}</div>
      <div class="dict-row-badge">${getWordBadge(w.fr)}</div>
    </div>`;
}

function getDictMatches(){
  const q = dictQuery.trim();
  const qNorm = normalizeForSearch(q);
  return WORDS.filter(w => {
    if(dictCat && w.cat !== dictCat) return false;
    if(!q) return true;
    return normalizeForSearch(w.fr).includes(qNorm) || w.ar.includes(q) || normalizeForSearch(w.def).includes(qNorm);
  });
}

function renderDictResults(){
  const resultsEl = document.getElementById('dictResults');
  const countEl = document.getElementById('dictCount');
  if(!resultsEl) return;
  const matches = getDictMatches();

  const CARD_LIMIT = 120;
  let shown = matches;
  let limitNote = '';
  if(dictView === 'cards' && matches.length > CARD_LIMIT){
    shown = matches.slice(0, CARD_LIMIT);
    limitNote = ` · ${CARD_LIMIT} affichés en mode cartes (affine ta recherche ou passe en liste)`;
  }

  countEl.textContent = `${matches.length} mot${matches.length>1?'s':''}${dictCat ? ' · ' + dictCat : ''}${limitNote}`;

  if(matches.length === 0){
    resultsEl.innerHTML = `<div class="no-results">Aucun mot trouvé${dictQuery ? ' pour « ' + escapeHtml(dictQuery.trim()) + ' »' : ''}.</div>`;
    return;
  }

  if(dictView === 'list'){
    resultsEl.innerHTML = `<div class="dict-list">` + shown.map(buildWordRowHtml).join('') + `</div>`;
  } else {
    resultsEl.innerHTML = shown.map(buildWordCardHtml).join('');
  }
}

function renderHistoryView(){
  clearQuestionTimer();

  BLOCKS.forEach((b, i) => {

  });

function renderChronoCard(){
  const word = queue[0];
  answered = false;
  const isTrue = Math.random() < 0.5;
  let displayWord = word;
  if(!isTrue){
    const pool = WORDS.filter(w => w.fr !== word.fr);
    displayWord = pool[Math.floor(Math.random()*pool.length)];
  }
  window.__currentWord = word;
  window.__chronoIsTrue = isTrue;

  const sentenceHtml = escapeHtml(word.ex).replace(/~/g, `<strong style="color:var(--purple);">${escapeHtml(displayWord.fr)}</strong>`);

  const card = document.getElementById('quizCard');
  card.innerHTML = `

function startQuestionTimer(onTimeout){
  clearQuestionTimer();

  if(!fill) return;
  fill.style.transition = 'none';
  fill.style.width = '100%';
  void fill.offsetWidth;
  fill.style.transition = `width ${quizTimerSeconds}s linear`;
  fill.style.width = '0%';
  questionTimer = setTimeout(onTimeout, quizTimerSeconds * 1000);
}
function clearQuestionTimer(){
  if(questionTimer){ clearTimeout(questionTimer); questionTimer = null; }
  const fill = document.getElementById('quizTimerFill');
  if(fill){
    const w = getComputedStyle(fill).width;
    fill.style.transition = 'none';
    fill.style.width = w;
  }
}

function handleChronoAnswer(playerSaysTrue){
  if(answered) return;
  answered = true;
  clearQuestionTimer();
  const word = window.__currentWord;
  const isTrue = window.__chronoIsTrue;
  const isCorrect = (playerSaysTrue === isTrue);

  score.total++;
  if(!catScore[word.cat]) catScore[word.cat] = { c:0, t:0 };
  catScore[word.cat].t++;
  attemptsByFr[word.fr] = (attemptsByFr[word.fr] || 0) + 1;

  if(isCorrect){
    score.correct++; catScore[word.cat].c++;
    masteredCount++;
    queue.shift();
    chronoStreak++;
    if(chronoStreak > chronoBestStreak) chronoBestStreak = chronoStreak;
    sessionHistory.push({ fr: word.fr, ar: word.ar, def: word.def, cat: word.cat, attempts: attemptsByFr[word.fr] });
  } else {
    const w = queue.shift();
    queue.push(w);
    chronoStreak = 0;
  }

  recordWordStat(word.fr, isCorrect);

  const trueBtn = document.getElementById('chronoTrueBtn');
  const falseBtn = document.getElementById('chronoFalseBtn');
  trueBtn.classList.add('disabled');
  falseBtn.classList.add('disabled');
  (isTrue ? trueBtn : falseBtn).style.outline = '4px solid #16A34A';
  if(playerSaysTrue !== null && !isCorrect){
    (playerSaysTrue ? trueBtn : falseBtn).style.outline = '4px solid #C7292E';
  }

  if(isCorrect){ launchConfetti(); playCorrectSound(); }
  else {
    const cardEl = document.getElementById('quizCard');
    cardEl.classList.remove('shake'); void cardEl.offsetWidth; cardEl.classList.add('shake');
    playWrongSound();
  }

  renderScoreboard();

  const revealWrap = document.getElementById('revealWrap');
  revealWrap.classList.add('show');
  const timedOutMsg = playerSaysTrue === null ? ' (temps écoulé !) ' : ' ';
  revealWrap.innerHTML = `
    <div class="feedback-msg ${isCorrect ? 'ok' : 'ko'}">${isCorrect ? '✓ Bien vu !' : '✗ Raté' + timedOutMsg + '— voici le mot :'}</div>
    <div class="seal">
      <div class="seal-badge">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#2A2107" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="arabic-word">${escapeHtml(word.ar)}</div>
    </div>
    <div class="def-text"><strong>${escapeHtml(word.fr)}</strong> — ${escapeHtml(word.def)}</div>
    <div class="ex-row">
      <div class="ex-text">${renderExample(word.ex)}</div>
      <button class="speak-btn small" id="speakExBtn" title="Écouter la phrase" aria-label="Écouter la phrase">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>
      </button>
    </div>
    <button class="next-btn" id="nextBtn">Suivant →</button>
  `;
  document.getElementById('speakExBtn').addEventListener('click', () => {
    speak(word.ex.replace(/~/g, word.fr), 'fr-FR');
  });
  document.getElementById('nextBtn').addEventListener('click', () => { renderCard(); });
}

function handleAnswer(i){
  if(answered) return;
  answered = true;
  clearQuestionTimer();
  const options = window.__currentOptions;
  const word = window.__currentWord;
  const chosen = (i !== null && i !== undefined) ? options[i] : null;
  const isCorrect = chosen ? chosen.fr === word.fr : false;
  const timedOut = (i === null || i === undefined);

  score.total++;
  if(!catScore[word.cat]) catScore[word.cat] = { c:0, t:0 };
  catScore[word.cat].t++;
  attemptsByFr[word.fr] = (attemptsByFr[word.fr] || 0) + 1;

  if(isCorrect){
    score.correct++; catScore[word.cat].c++;
    masteredCount++;
    queue.shift();
    sessionHistory.push({
      fr: word.fr, ar: word.ar, def: word.def, cat: word.cat,
      attempts: attemptsByFr[word.fr]
    });
  } else {
    // le mot raté repasse plus tard dans la même session, il faudra le refaire
    const w = queue.shift();
    queue.push(w);
  }

  document.querySelectorAll('.opt').forEach((btn, bi) => {
    btn.classList.add('disabled');
    if(options[bi].fr === word.fr){ btn.classList.add('correct'); }
    else if(!timedOut && bi === i){ btn.classList.add('wrong'); }
    else { btn.classList.add('faded'); }
  });

  recordWordStat(word.fr, isCorrect);

  if(isCorrect){
    launchConfetti();
    playCorrectSound();
  } else {
    const card = document.getElementById('quizCard');
    card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
    playWrongSound();
  }

  renderScoreboard();

  const revealWrap = document.getElementById('revealWrap');
  revealWrap.classList.add('show');
  const msgText = isCorrect
    ? '✓ Bonne réponse !'
    : (timedOut ? '⏱️ Temps écoulé ! Ce mot reviendra plus tard dans le bloc :' : '✗ Pas tout à fait — ce mot reviendra plus tard dans le bloc :');
  revealWrap.innerHTML = `
    <div class="feedback-msg ${isCorrect ? 'ok' : 'ko'}">${msgText}</div>
    <div class="seal">
      <div class="seal-badge">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#2A2107" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="arabic-word">${escapeHtml(word.ar)}</div>
    </div>
    <div class="def-text"><strong>${escapeHtml(word.fr)}</strong> — ${escapeHtml(word.def)}</div>
    <div class="ex-row">
      <div class="ex-text">${renderExample(word.ex)}</div>
      <button class="speak-btn small" id="speakExBtn" title="Écouter la phrase" aria-label="Écouter la phrase">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>
      </button>
    </div>
    <button class="next-btn" id="nextBtn">Mot suivant →</button>
  `;
  document.getElementById('speakExBtn').addEventListener('click', () => {
    const fullSentence = word.ex.replace(/~/g, word.fr);
    speak(fullSentence, 'fr-FR');
  });
  document.getElementById('nextBtn').addEventListener('click', () => { renderCard(); });
}

function buildRecapTableHtml(history){
  const rows = history.map(w => {
    const isRetry = w.attempts > 1;
    const statusHtml = isRetry
      ? `<span class="rc-status retry">⚠ ${w.attempts}e essai</span>`
      : `<span class="rc-status first">✓ 1er essai</span>`;
    return `<tr>
      <td><strong>${escapeHtml(w.fr)}</strong></td>
      <td class="rc-ar">${escapeHtml(w.ar)}</td>
      <td>${escapeHtml(w.def)}</td>
      <td class="rc-status-cell">${statusHtml}</td>
      <td><button class="rc-speak" data-speak="${escapeHtml(w.fr)}" title="Écouter">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
      </button></td>
    </tr>`;
  }).join('');
  return `
    <div class="recap-wrap">
      <div class="recap-scroll">
        <table class="recap-table">
          <thead><tr><th>Mot</th><th>Arabe</th><th>Définition</th><th>Résultat</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function attachRecapSpeakHandlers(){
  document.querySelectorAll('.rc-speak').forEach(btn => {
    btn.addEventListener('click', () => speak(btn.dataset.speak, 'fr-FR'));
  });
}

const MODE_LABELS = { classic: '🎯 Classique', blank: '🕳️ Phrase à trous', chrono: '⚡ Chrono Vrai/Faux' };

function renderRecapView(blockIndex, result, justFinished){
  clearQuestionTimer();
  const pct = result.total ? Math.round((result.correct/result.total)*100) : 0;
  const errors = result.total - result.correct;
  const history = result.history || [];
  const errorCount = history.filter(w => w.attempts > 1).length;
  const modeLabel = MODE_LABELS[result.mode || gameMode] || '';

  const card = document.getElementById('quizCard');
  card.innerHTML = `
    <div class="end-screen">
      <div class="cat-tag">${justFinished ? 'Bloc ' + (blockIndex+1) + ' terminé' : 'Récapitulatif — Bloc ' + (blockIndex+1)} · ${modeLabel} — ${history.length || result.total} mots</div>
      <div class="big">${result.correct} / ${result.total}</div>
      <div class="sub" style="color:#6B6552;">${pct}% de bonnes réponses au total${errorCount > 0 ? ` · ${errorCount} mot${errorCount>1?'s':''} eu${errorCount>1?'rent':''} au moins une erreur` : ' · sans erreur, bravo !'}</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap;">
        <button class="restart-btn" id="restartBtn">Refaire ce bloc (${modeLabel})</button>
        <button class="restart-btn" id="blocksBtn" style="background:var(--purple);color:#fff;box-shadow:0 4px 0 var(--purple-dark);">← Choisir un autre bloc</button>
      </div>
      ${history.length ? buildRecapTableHtml(history) : '<div class="sub" style="margin-top:20px;color:#8A8266;">Détail mot par mot indisponible pour cette session (ancienne version).</div>'}
    </div>
  `;
  document.getElementById('footerNote').textContent = justFinished ? 'Terminé' : '';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('restartBtn').addEventListener('click', () => { buildDeck(blockIndex); renderScoreboard(); renderCard(); });
  document.getElementById('blocksBtn').addEventListener('click', renderBlockSelect);

function renderEndScreen(){
  const result = { correct: score.correct, total: score.total, history: sessionHistory.slice(), mode: gameMode, finishedAt: Date.now() };
  saveBlockResult(currentBlock, gameMode, result);
  renderRecapView(currentBlock, result, true);
  cloudAutoPush();
}

/* ===================== ☁️ SYNCHRO GOOGLE SHEETS ===================== */
const SYNC_URL_KEY = 'lexiqueQuiz::syncUrl';
const LAST_SYNC_KEY = 'lexiqueQuiz::lastSync';
const SYNC_EXCLUDED = [SYNC_URL_KEY, LAST_SYNC_KEY];
let syncBusy = false;

function getSyncUrl(){
  try{ return localStorage.getItem(SYNC_URL_KEY) || ''; }catch(e){ return ''; }
}
function setSyncUrl(u){
  try{
    if(u){ localStorage.setItem(SYNC_URL_KEY, u); } else { localStorage.removeItem(SYNC_URL_KEY); }
  }catch(e){}
}
function safeParse(s, fallback){
  try{ return JSON.parse(s); }catch(e){ return fallback; }
}

function collectLocalData(){
  const data = {};
  try{
    for(let i = 0; i < localStorage.length; i++){
      const key = localStorage.key(i);
      if(!key || !key.startsWith('lexiqueQuiz::')) continue;
      if(SYNC_EXCLUDED.includes(key)) continue;
      data[key] = localStorage.getItem(key);
    }
  }catch(e){}
  return data;
}

async function cloudRequest(bodyObj){
  const url = getSyncUrl();
  if(!url) throw new Error('URL de synchro non configurée');
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(bodyObj)
  });
  const out = await res.json();
  if(!out.ok) throw new Error(out.error || 'Réponse invalide du script');
  return out;
}

async function cloudPush(){
  const data = collectLocalData();
  const out = await cloudRequest({ action: 'push', data });
  try{ localStorage.setItem(LAST_SYNC_KEY, String(Date.now())); }catch(e){}
  return out.saved || 0;
}

async function cloudPull(){
  const out = await cloudRequest({ action: 'pull' });
  const changed = mergeRemoteData(out.data || {});
  try{ localStorage.setItem(LAST_SYNC_KEY, String(Date.now())); }catch(e){}
  return changed;
}

function cloudDeleteKeys(keys){
  if(!getSyncUrl()) return;
  cloudRequest({ action: 'delete', keys }).catch(() => {});
}

/* Fusionne les données distantes dans le stockage local, sans rien perdre. */
function mergeRemoteData(remote){
  let changed = false;
  for(const key of Object.keys(remote)){
    const rv = remote[key].v;
    if(rv == null) continue;

    if(key === WORD_STATS_KEY){
      const remoteStats = safeParse(rv, {});
      let m = false;
      for(const w of Object.keys(remoteStats)){
        const rs = remoteStats[w];
        const ls = wordStats[w];
        if(!ls || ((rs.correct||0) + (rs.wrong||0)) > ((ls.correct||0) + (ls.wrong||0))){
          wordStats[w] = rs; m = true;
        }
      }
      if(m){ saveWordStats(); changed = true; }

    } else if(key === CUSTOM_WORDS_KEY){
      const remoteWords = safeParse(rv, null);
      if(Array.isArray(remoteWords) && remoteWords.length){
        const base = loadCustomWords() || WORDS.slice();
        const seen = new Set(base.map(w => w.fr.toLowerCase()));
        let added = 0;
        remoteWords.forEach(w => {
          if(!w || !w.fr) return;
          const k = w.fr.toLowerCase();
          if(!seen.has(k)){ seen.add(k); base.push(w); added++; }
        });
        if(added > 0 || !loadCustomWords()){
          saveCustomWords(base);
          WORDS = base;
          changed = true;
        }
      }

    } else if(rv.includes('finishedAt')){
      // résultat de bloc : on garde le plus récent
      const remoteRes = safeParse(rv, null);
      const localRaw = (()=>{ try{ return localStorage.getItem(key); }catch(e){ return null; } })();
      const localRes = localRaw ? safeParse(localRaw, null) : null;
      if(remoteRes && (!localRes || (remoteRes.finishedAt||0) > (localRes.finishedAt||0))){
        try{ localStorage.setItem(key, rv); }catch(e){}
        changed = true;
      }

    } else {
      // petites préférences (durée du chrono, affichage...) : le cloud gagne
      try{
        if(localStorage.getItem(key) !== rv){ localStorage.setItem(key, rv); changed = true; }
      }catch(e){}
    }
  }

  if(changed){
    quizTimerSeconds = loadTimerSetting();
    try{ const dv = localStorage.getItem('lexiqueQuiz::dictView'); if(dv==='list'||dv==='cards') dictView = dv; }catch(e){}
    rebuildBlocks();
  }
  return changed;
}

function cloudAutoPush(){
  if(!getSyncUrl() || syncBusy) return;
  syncBusy = true;
  cloudPush()
    .then(() => { setStatus('☁️ Scores synchronisés.', 'ok'); })
    .catch(() => { setStatus('☁️ Synchro impossible (hors ligne ?) — scores gardés en local.', 'err'); })
    .finally(() => { syncBusy = false; });
}

async function autoSyncOnLoad(){
  if(!getSyncUrl()) return;
  try{
    setStatus('☁️ Synchronisation...', 'ok');
    const changed = await cloudPull();
    await cloudPush();
    setStatus(changed ? '☁️ Synchronisé — nouvelles données récupérées !' : '☁️ Synchronisé.', 'ok');
    if(changed && currentBlock === null){ renderBlockSelect(); }
  }catch(e){
    setStatus('☁️ Synchro impossible — mode local.', 'err');
  }
}

function formatLastSync(){
  try{
    const t = parseInt(localStorage.getItem(LAST_SYNC_KEY), 10);
    if(!t) return 'jamais';
    return new Date(t).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  }catch(e){ return 'jamais'; }
}

  clearQuestionTimer();
  currentBlock = null;
  document.getElementById('scoreboard').innerHTML = `<button class="chip total" id="backFromSyncBtn" style="cursor:pointer;">← Retour aux blocs</button>`;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('footerNote').textContent = '';

  const card = document.getElementById('quizCard');
  const hasUrl = !!getSyncUrl();
  card.innerHTML = `
    <div class="cat-tag">☁️ Synchro Google Sheets</div>
    <div class="word-fr" style="font-size:clamp(24px,4.5vw,32px);">Tes scores, partout</div>
    <div class="question-line">Colle l'URL de ton script Google (celle qui finit par <b>/exec</b>) pour synchroniser scores et lexique entre ton PC et ton téléphone.</div>
    <div class="search-box-wrap">
      <input type="text" id="syncUrlInput" class="search-input" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off" value="${escapeHtml(getSyncUrl())}">
    </div>

      <button class="mode-chip" id="pullSyncBtn" ${hasUrl?'':'disabled style="opacity:.5;"'}>⇣ Récupérer du cloud</button>
    </div>
    <div class="question-line" id="syncStatusLine" style="margin-top:6px;">Dernière synchro : <b>${formatLastSync()}</b>${hasUrl ? ' · synchro auto au démarrage et après chaque bloc ✅' : ''}</div>
    <div class="result-card" style="margin-top:10px;">
      <div class="result-def"><b>Pas encore de script ?</b> Ouvre le fichier <b>apps-script-sync.gs</b> que je t'ai fourni : les 6 étapes d'installation sont en haut du fichier (5 minutes, gratuit, sans carte bancaire).</div>
    </div>
  `;
  document.getElementById('backFromSyncBtn').addEventListener('click', renderBlockSelect);

  const statusLine = document.getElementById('syncStatusLine');
  const setSyncMsg = (msg, ok) => { statusLine.innerHTML = `<span style="color:${ok?'var(--green-dark)':'var(--red-dark)'};font-weight:800;">${msg}</span>`; };

  document.getElementById('saveSyncBtn').addEventListener('click', () => {
    const u = document.getElementById('syncUrlInput').value.trim();
    if(u && !/^https:\/\/script\.google(usercontent)?\.com\//.test(u)){
      setSyncMsg('⚠️ Cette URL ne ressemble pas à une URL Apps Script (/exec).', false);
      return;
    }
    setSyncUrl(u);
    setSyncMsg(u ? '✓ URL enregistrée ! Tu peux maintenant Envoyer / Récupérer.' : 'URL effacée — synchro désactivée.', true);
    renderSyncView();
  });

  document.getElementById('pushSyncBtn').addEventListener('click', async () => {
    setSyncMsg('⏳ Envoi en cours...', true);
    try{
      const n = await cloudPush();
      setSyncMsg(`✓ ${n} élément${n>1?'s':''} envoyé${n>1?'s':''} vers ta feuille Google !`, true);
    }catch(e){ setSyncMsg('✗ Échec de l\'envoi : ' + escapeHtml(e.message), false); }
  });

  document.getElementById('pullSyncBtn').addEventListener('click', async () => {
    setSyncMsg('⏳ Récupération en cours...', true);
    try{
      const changed = await cloudPull();
      setSyncMsg(changed ? '✓ Données récupérées et fusionnées !' : '✓ Déjà à jour, rien de nouveau.', true);
    }catch(e){ setSyncMsg('✗ Échec de la récupération : ' + escapeHtml(e.message), false); }
  });
}
/* =================== fin module synchro =================== */


rebuildBlocks();
if(savedCustom){ setStatus(`↺ Lexique personnalisé restauré (${WORDS.length} mots).`, 'ok'); }
renderBlockSelect();
autoSyncOnLoad();
</script>
